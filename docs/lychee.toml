# lychee.toml — Lychee link checker configuration
# Used by `make linkcheck` and the lychee CI workflows.
# Pinned version: see docs/lychee-version

# Runtime — gentle defaults, avoid thundering-herd 429s
max_retries = 3
max_concurrency = 8
timeout = 20

# Browser-like User-Agent reduces bot-blocking false positives
user_agent = "Mozilla/5.0 (X11; Linux x86_64; rv:109.0) Gecko/20100101 Firefox/115.0"

# Treat 429 as non-broken so rate-limited URLs don't fail the run
accept = ["100..=103", "200..=299", "429"]

# .rst is not in lychee defaults
extensions = ["md", "rst"]

# GITHUB_TOKEN is auto-read from env by lychee — do not embed.

# Patterns below are Rust regex (lychee uses the `regex` crate): escape literal
# dots as `\.`; forward slashes are not metacharacters and stay unescaped.
exclude = [
    # Local references — not reachable from the link checker
    "^http://localhost",
    "^http://127\\.0\\.0\\.1",
    "^file://",

    # Templated URLs in code samples — `$VAR`, `${VAR}`, or URL-encoded `$%7BVAR%7D`
    "\\$\\{",
    "\\$%7B",
    "\\$[A-Z]",

    # Read the Docs anchor checks — flaky; fragments only checked when listed
    "^https://.*\\.readthedocs-hosted\\.com/.*#\\w+$",

    # API endpoints that reject HEAD/GET (405 Method Not Allowed) but are valid references
    "^https://api\\.snapcraft\\.io/api/",

    # gnu.org blocks bot User-Agents with 403; valid references
    "^https://www\\.gnu\\.org/",

    # Transient overrides before public release
    "^https://ubuntu\\.com/workshop/",
    "^https://github\\.com/canonical/sdkcraft",
    "^https://github\\.com/canonical/workshop",
    "^https://github\\.com/canonical/sdks",
    "^https://github\\.com/canonical/reference-workshops",
    "^https://github\\.com/canonical/reference-sdks",
    "^https://github\\.com/canonical/launch-workshop",
    "^https://github\\.com/canonical/.*-sdk(-ng)?$",
]
