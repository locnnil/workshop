summary: Run tutorial commands to ensure it's operational

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup ./

execute: |
  . "$TESTSLIB"/utils.sh

  workshop_exec --help
  mkdir hello-workshop/
  mv main.go .workshop.nimble.yaml hello-workshop/
  chown -R ubuntu:ubuntu hello-workshop/
  cd hello-workshop/
  workshop_exec list
  workshop_exec launch nimble
  cd ..
  mv hello-workshop hi-workshop
  cd hi-workshop
  workshop_exec list
  workshop_exec changes
  workshop_exec tasks $(workshop_exec changes | awk 'END{print $1}')
  workshop_exec stop nimble
  workshop_exec start nimble
  workshop_exec refresh nimble
  sed -i "s/stable/edge/g" .workshop.nimble.yaml
  workshop_exec refresh --wait-on-error nimble || true
  workshop_exec changes
  workshop_exec tasks $(workshop_exec changes | awk 'END{print $1}')
  workshop_exec refresh --continue nimble || true
  workshop_exec refresh --abort nimble
  workshop_exec exec nimble go build main.go
  workshop_exec exec nimble --env GO111MODULE=off -- go build -x
  workshop_exec exec nimble -- bash -c "uname -a"
  touch outside.txt
  workshop_exec exec nimble -- bash -c "ls -l"
  workshop_exec exec nimble -- touch inside.txt
  ls -l
  workshop_exec remove nimble
