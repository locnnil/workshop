summary: Run tutorial commands to ensure it's operational
prepare: |
  chmod u+x "$TESTSLIB"/documentation/tutorial.sh
  mkdir -p /home/ubuntu/workshop
  cp -R /remote/* /home/ubuntu/workshop
  chown -R ubuntu:ubuntu /home/ubuntu/workshop
restore: |
  rm -rf /home/ubuntu/workshop
  snap remove snapcraft workshop
  # Remove snapcraft-created LXD containers
  lxc project switch snapcraft
  for c in $(lxc list | awk '{print $2}'  | grep ^snapcraft- | grep -v snapcraft-dev); do
    lxc delete $c --force
  done
execute: |
  sudo -u ubuntu 2>&1 -- bash -c "$TESTSLIB"/documentation/tutorial.sh
