summary: Run tutorial commands to ensure it's operational
restore: |
  rm -rf ~/ollama-python-project ~/.ollama
execute: |
  . "$TESTSLIB"/utils.sh

  # ----------------------------------------------------------------------------

  # Part 1: Get Started


  ## Define, add SDKs

  workshop completion bash -h

  mkdir ollama-python-project/

  chown -R ubuntu:ubuntu ollama-python-project/
  cd ollama-python-project/
  git init 2>/dev/null || true
  cp ../workshop.yaml .

  workshop_exec list


  ## Launch, start, and stop

  workshop_exec launch
  workshop_exec info
  echo ".workshop.lock" >> .gitignore

  workshop_exec stop
  workshop_exec start


  ## Refresh a workshop

  sed -i "s/24.04/22.04/g" workshop.yaml
  workshop_exec refresh


  ## Execute commands

  workshop_exec exec nimble -- ollama pull tinyllama  # Non-interactive version
  workshop_exec exec nimble -- ollama list


  ## Interactive shell

  workshop_exec exec nimble bash -c "pwd"  # Non-interactive version
  workshop_exec exec nimble bash -c "lsb_release -a"
  workshop_exec exec nimble bash -c "echo \$USER"


  ## Project directory updates

  touch created_outside.txt
  workshop_exec exec nimble -- ls /project/
  workshop_exec exec nimble bash -c "[ -f \"created_outside.txt\" ]"
  workshop_exec exec nimble -- touch /project/created_inside.txt
  [ -f "created_inside.txt" ]


  ## Track changes and tasks

  workshop_exec tasks $(workshop_exec changes | awk 'END{print $1}')

  # ----------------------------------------------------------------------------

  # Part 2: Interfaces


  ## Manage connections

  workshop_exec connections

  workshop_exec disconnect nimble/ollama:models
  workshop_exec connections
  workshop_exec connect nimble/ollama:models :mount
  workshop_exec connections

  mkdir -p ~/.ollama/models
  workshop_exec remount nimble/ollama:models ~/.ollama/models
  workshop_exec info


  ## Add plugs, slots

  cp ../workshop-part-2.yaml workshop.yaml
  workshop_exec refresh
  workshop_exec connections --all
  workshop_exec info
  # curl http://127.0.0.1:8989/lab?


  # ----------------------------------------------------------------------------

  # Part 3: Sketch SDKs


  ## Start sketching

  sudo TERM=ansi EDITOR=ex -u ubuntu -- workshop sketch-sdk <<EOF
  1/^hooks:$/a
    setup-project: |
      source /var/lib/workshop/sdk/jupyter/venv/bin/activate
      pip install jupyter-console
  .
  wq
  EOF

  workshop_exec info | grep -v notes | yq '.sdks["sketch"].installed' | MATCH '\(x1\)$'

  # workshop_exec exec nimble -- "source /var/lib/workshop/sdk/jupyter/venv/bin/activate && jupyter console -h"


  ## Stash and restore

  workshop_exec sketch-sdk --stash
  workshop_exec sketch-sdk --restore


  ## Explore sketches

  workshop_exec sketches


  ## Convert to in-project SDK

  workshop_exec sketch-sdk --eject --name console
  [ -f .workshop/console/sdk.yaml ]

  # git add .workshop/
  # git commit -m "Add jupyter-console in-project SDK"


  ## Clean up

  workshop_exec sketch-sdk --remove
  workshop_exec remove

  # ----------------------------------------------------------------------------

  ## Part 4: Craft SDKs

  run_sdkcraft --help
  mkdir ../ollama/ && cd ../ollama/
  run_sdkcraft init
  mv ../sdk.yaml .
  mv ../ollama.service .
  mkdir hooks
  mv ../{setup-base,save-state,restore-state,check-health,setup-project} hooks/
  run_sdkcraft clean
  run_sdkcraft pack
  run_sdkcraft try
  cp ../workshop-part-4.yaml workshop.yaml
  workshop launch
