summary: Run CLI reference command samples to ensure they're operational
execute: |
  . "$TESTSLIB"/utils.sh

  # Preparation
  mkdir ref-workshop-cli/
  mv main.go .workshop ref-workshop-cli/
  chown -R ubuntu:ubuntu ref-workshop-cli/
  cd ref-workshop-cli/

  # Commands appear in a natural sequential order rather that alphabetically;
  # Launch goes first, connect foregoes disconnect, etc.

  # Help
  workshop_exec --help

  # Launch
  workshop_exec launch

  # Changes
  workshop_exec changes

  # Tasks
  workshop_exec tasks $(workshop_exec changes | awk 'END{print $1}')

  # List
  workshop_exec list
  workshop_exec list --global

  # Info
  workshop_exec info

  # Warnings
  workshop_exec warnings

  # Okay (TODO)
  workshop_exec okay || true

  # Stop
  workshop_exec stop

  # Start
  workshop_exec start

  # Refresh (TODO)
  sed -i "s/22.04/24.04/g" .workshop/nimble.yaml
  sed -i "s/latest/noble/g" .workshop/nimble.yaml
  workshop_exec refresh --wait-on-error
  workshop_exec refresh --abort || workshop_exec refresh --continue || true

  # Exec
  workshop_exec exec nimble go build main.go
  workshop_exec exec --env GO111MODULE=off -w /project/ nimble go build -x
  workshop_exec exec --uid 0 nimble id

  # Shell (TODO)
  workshop_exec shell

  # Connections
  workshop_exec connections nimble
  workshop_exec connections

  # Disconnect, Connect
  workshop_exec disconnect nimble/test-sdk-go:mod-cache
  workshop_exec connect nimble/test-sdk-go:mod-cache :mount
  workshop_exec disconnect nimble/test-sdk-go:mod-cache nimble/system:mount
  workshop_exec connect nimble/test-sdk-go:mod-cache nimble/system:mount
  workshop_exec disconnect nimble/system:mount
  workshop_exec connect nimble/test-sdk-go:mod-cache :mount

  # Remount
  workshop_exec remount nimble/test-sdk-go:mod-cache ~/new-cache-mount/

  # Remove
  workshop_exec remove
