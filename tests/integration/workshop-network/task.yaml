summary: Test LXD network backend

execute: |
  rm -rf cover
  mkdir cover

  go test -cover "$SPREAD_PATH"/internal/workshop/lxd/tests/integration -timeout=30m -tags=integration -check.v -check.f networkSuite -coverpkg=github.com/canonical/workshop/internal/workshop/lxd -args -test.gocoverdir="$PWD"/cover
artifacts:
  - cover
