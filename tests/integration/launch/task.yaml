summary: Launch an empty workspace

environment:
  WS_NAME: integration-test
execute: |
  for base in ubuntu@20.04 ubuntu@22.04
  do
    cat <<-EOF > /home/ubuntu/.workspace.$WS_NAME.yaml
    name: $WS_NAME
    base: $base 
  EOF

    echo Launch $WS_NAME with a $base base
    su - ubuntu -c 'PATH=~/go/bin; workspace launch $WS_NAME' | MATCH started
    lxc project switch workspace.ubuntu

    echo "Validate project directory mount"
    lxc config device get $WS_NAME workspace.project source | MATCH /home/ubuntu
    lxc config device get $WS_NAME workspace.project path | MATCH /project

    echo $WS_NAME must be in a RUNNING state
    lxc list -c ns -f compact | MATCH "$WS_NAME  RUNNING"
    
    lxc delete $WS_NAME --force
  done