summary: Check a failed non-transactional launch can be aborted successfully
execute: |
  . "$TESTSLIB"/utils.sh

  cp workshop.setup-fail.yaml workshop.yaml

  echo "Check launch --abort with no paused launch reports a clear error"
  output="$(workshop_exec launch --abort || true)"
  echo "$output" | MATCH 'cannot abort: no launch in progress'

  workshop_exec launch --wait-on-error || true

  echo "Check the workshop is in Waiting state"
  workshop_exec list | MATCH "^ws-launch-abort[[:space:]]+Waiting[[:space:]]+wait-on-error$"

  echo "Check the \"workshop launch --abort\" command reverts to the previous state"
  workshop_exec launch --abort | MATCH "\"ws-launch-abort\" launch aborted"
  workshop_exec list | MATCH "^ws-launch-abort[[:space:]]+Off[[:space:]]+-$"

  echo "Validate the task output from the launch attempt"
  workshop_exec tasks | tail -1 | MATCH ".*Aborting \"launch\" for workshop \"ws-launch-abort\"..."

  echo "Ensure SDKs are unlinked successfully during abort"
  echo "Update the workshop file to use test-sdk-mount-broken"
  cp workshop.mount-broken.yaml workshop.yaml
  ! workshop_exec launch --wait-on-error || false
  cp workshop.setup-fail.yaml workshop.yaml

  workshop_exec launch --abort
  workshop_exec tasks | tail -2 | MATCH '.*"test-sdk-mount-broken" SDK has bad plugs or slots: one \(unknown attribute for mount interface slot: "host-source"\)'
