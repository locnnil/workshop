summary: Check major workshop shell scenarios
prepare: |  
  . "$TESTSLIB"/utils.sh
  workshop_exec launch ws-shell
restore: |
  . "$TESTSLIB"/utils.sh
  workshop_exec remove ws-shell
execute: |
  . "$TESTSLIB"/utils.sh

  workshop_exec shell ws-shell

  echo "Check stopped workshop"
  workshop_exec stop ws-shell
  workshop_exec shell ws-shell | MATCH '.*"ws-shell" status is "Stopped", must be one of: "Ready", "Pending"$'
