summary: Check that "workshop connections" works as expected
prepare: |
  . "$TESTSLIB"/utils.sh
  resolve_branch .workshop/ws-conns-1.yaml .workshop/ws-conns-2.yaml
  workshop_exec launch ws-conns-1 ws-conns-2
restore: |
  . "$TESTSLIB"/utils.sh
  workshop_exec remove ws-conns-1 ws-conns-2
execute: |
  . "$TESTSLIB"/utils.sh

  echo "Check connections for a workshop name provided"
  workshop_exec connections ws-conns-1 | MATCH "^mount.+ws-conns-1/test-sdk-mount:one.+:mount.+\-$"
  workshop_exec connections ws-conns-1 | MATCH "^mount.+ws-conns-1/test-sdk-mount:two.+:mount.+\-$"  

  echo "Check connections for all workshops of the project"
  workshop_exec connections | MATCH "^mount.+ws-conns-1/test-sdk-mount:one.+:mount.+\-$"
  workshop_exec connections | MATCH "^mount.+ws-conns-1/test-sdk-mount:two.+:mount.+\-$"  
  workshop_exec connections | MATCH "^mount.+ws-conns-2/test-sdk-mount:one.+:mount.+\-$"
  workshop_exec connections | MATCH "^mount.+ws-conns-2/test-sdk-mount:two.+:mount.+\-$"
