summary: Check that basic refresh scenarios work correctly for the transactional mode
prepare: |
  . "$TESTSLIB"/utils.sh
  apt-add-repository -y universe
  apt install expect -y --no-install-recommends
  resolve_branch multi/.workshop/ws-refresh-sdk.yaml multi/.workshop/ws-refresh-snapshots.yaml
  workshop_exec launch --project single
  workshop_exec launch ws-refresh ws-refresh-sdk ws-refresh-snapshots --project multi
restore: |
  . "$TESTSLIB"/utils.sh
  apt remove -y expect
  workshop_exec remove --project single
  workshop_exec remove ws-refresh ws-refresh-sdk ws-refresh-snapshots --project multi
execute: |
  . "$TESTSLIB"/utils.sh

  echo "Modify apt cache for later"
  cd single
  workshop_exec exec -- sudo touch /var/cache/apt/archives/sentinel

  echo "Check refresh supports project-level workshop definitions"
  workshop_exec refresh

  echo "Check apt cache is preserved across refreshes"
  workshop_exec exec -- mountpoint /var/cache/apt/archives
  workshop_exec exec -- sudo test -f /var/cache/apt/archives/sentinel

  echo "Check workshop refresh --no-wait"
  echo -e "sdks:\n  - name: test-sdk-health-waiting\n    channel: latest/stable${TEST_SDK_BRANCH}" >> workshop.yaml
  workshop_exec refresh --no-wait

  # The refresh process here takes about 10s. 
  # The hook check-health should fail four times before final success.
  # Check tests/lib/sdk/test-sdk-health-waiting/latest/stable/sdk/hooks/check-health for details
  sudo -u ubuntu 2>&1 -- expect -f ./health.exp

  echo "Check refresh supports multi-workshop projects"
  cd ../multi
  workshop_exec refresh ws-refresh

  echo "Check refresh change is Done"
  workshop_exec changes | MATCH "^[0-9]*[[:space:]]+Done[[:space:]]+[:, [:alnum:]]+[[:space:]]+Refresh \"ws-refresh\" workshop$"

  echo "Check the workshop is in Ready state"
  workshop_exec list | MATCH "^ws-refresh[[:space:]]+Ready[[:space:]]+-$"

  workshop_exec refresh ws-refresh-sdk

  echo "Check refresh change is Done"
  workshop_exec changes | MATCH "^[0-9]*[[:space:]]+Done[[:space:]]+[:, [:alnum:]]+[[:space:]]+Refresh \"ws-refresh-sdk\" workshop$"

  echo "Check the workshop is in Ready state"
  workshop_exec list | MATCH "^ws-refresh-sdk[[:space:]]+Ready[[:space:]]+-$"

  echo "Check workshop refresh when no updates are available"
  workshop_exec refresh ws-refresh-sdk | MATCH "no updates available for \"ws-refresh-sdk\""

  list_snapshots() {
    local pid
    pid=$(cat .workshop.lock)

    lxc list \
      --project workshop-snapshots.ubuntu \
      --format csv \
      --columns user.workshop.sdk \
      user.workshop.project-id="$pid" \
      user.workshop.name=ws-refresh-snapshots \
      user.workshop.snapshot-type=sdk
  }

  validate_snapshots() {
    local expected_output="$1"
    local output
    output=$(list_snapshots)
    [ "$expected_output" = "$output" ]
  }

  echo "Check workshop snapshots exist"
  expected_snapshots="system
  test-sdk-basic
  test-sdk-gpu
  test-sdk-mount"
  validate_snapshots "$expected_snapshots"

  echo "Check workshop snapshots updated after an SDK was removed"
  # Annoyingly, yq snap is in strict mode and won't see these files.
  cat .workshop/ws-refresh-snapshots.yaml | yq 'del(.sdks[-1])' | sponge .workshop/ws-refresh-snapshots.yaml
  workshop_exec refresh ws-refresh-snapshots
  expected_snapshots="system
  test-sdk-basic
  test-sdk-mount"
  validate_snapshots "$expected_snapshots"

  echo "Check workshop was rebuilt from a new image base"
  cat .workshop/ws-refresh-snapshots.yaml | yq 'del(.sdks)' | sponge .workshop/ws-refresh-snapshots.yaml
  cat .workshop/ws-refresh-snapshots.yaml | yq '(.base) |= sub("ubuntu@22.04"; "ubuntu@24.04")' | sponge .workshop/ws-refresh-snapshots.yaml

  # Ensure there is no cached image so that refresh will take care of downloading it.
  lxc image list --columns F --format csv os=ubuntu version=24.04 | xargs -r lxc image delete

  workshop_exec refresh ws-refresh-snapshots
  workshop_exec info ws-refresh-snapshots | MATCH ubuntu@24.04
  workshop_exec exec ws-refresh-snapshots -- lsb_release -a | MATCH 24.04

  echo "Check workshop refresh when no updates are available"
  workshop_exec refresh ws-refresh-snapshots
  expected_snapshots="system"
  validate_snapshots "$expected_snapshots"
