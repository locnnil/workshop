summary: Check that basic refresh scenarios work correctly for the transactional mode
prepare: |  
  . "$TESTSLIB"/utils.sh
  workshop_exec launch ws-refresh ws-refresh-sdk
restore: |
  . "$TESTSLIB"/utils.sh
  workshop_exec remove ws-refresh ws-refresh-sdk
execute: |
  . "$TESTSLIB"/utils.sh

  echo "Modify apt cache for later"
  workshop_exec exec ws-refresh -- sudo touch /var/cache/apt/archives/sentinel

  workshop_exec refresh ws-refresh

  echo "Check refresh change is Done"
  workshop_exec changes | MATCH "^[0-9]*[[:space:]]+Done[[:space:]]+today[: [:alnum:]]+[[:space:]]+Refresh \"ws-refresh\" workshop$"

  echo "Check the workshop is in Ready state"
  workshop_exec list | MATCH "^.+[[:space:]]+ws-refresh[[:space:]]+Ready[[:space:]]+-$"

  echo "Check apt cache is preserved across refreshes"
  workshop_exec exec ws-refresh -- mountpoint /var/cache/apt/archives
  workshop_exec exec ws-refresh -- sudo test -f /var/cache/apt/archives/sentinel

  workshop_exec refresh ws-refresh-sdk

  echo "Check refresh change is Done"
  workshop_exec changes | MATCH "^[0-9]*[[:space:]]+Done[[:space:]]+today[: [:alnum:]]+[[:space:]]+Refresh \"ws-refresh-sdk\" workshop$"

  echo "Check the workshop is in Ready state"
  workshop_exec list | MATCH "^.+[[:space:]]+ws-refresh-sdk[[:space:]]+Ready[[:space:]]+-$"
