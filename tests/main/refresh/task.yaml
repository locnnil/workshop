summary: Ensure that refresh of an empty workspace works correctly
environment:
  WORKSPACES: $SPREAD_PATH/tests/lib/workspaces-empty
prepare: |
  . "$TESTSLIB"/utils.sh
  install_workspaced

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup "$WORKSPACES"
  uninstall_workspaced

debug: |
  workspace changes
  workspace tasks 1
  workspace tasks 2

execute: |
  . "$TESTSLIB"/utils.sh

  project="$WORKSPACES"/test-empty-ubuntu20
  launch $project ws

  echo "The launch change must present in the list"
  changes $project | MATCH "^1[[:space:]]+Done[[:space:]]+today[: [:alnum:]]+[[:space:]]+Launch workspace.*$"

  refresh $project ws

  echo "The refresh change must present in the list"
  changes $project | MATCH "^2[[:space:]]+Done[[:space:]]+today[: [:alnum:]]+[[:space:]]+Refresh workspace \"ws\"$"

  echo "The workspace must be in Ready state"
  list "$project" | MATCH "^.+[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"
