name: ws-user-conns
base: ubuntu@22.04
sdks:
  system:
    slots:
      user-slot:
        interface: content
      user-slot-2:
        interface: content
        workshop-source: user-data-2
  test-sdk-content:
    channel: latest/stable
    plugs:
      wp-plug:
        interface: content
        workshop-target: /mnt/wp-plug
connections:
  - plug: test-sdk-content:content-plug-one
    slot: system:user-slot
  - plug: test-sdk-content:content-plug-two
    slot: system:user-slot-2
  - plug: test-sdk-content:wp-plug
    slot: system:user-slot-2
