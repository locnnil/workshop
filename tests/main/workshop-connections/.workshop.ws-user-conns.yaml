name: ws-user-conns
base: ubuntu@22.04
sdks:
  host:
    slots:
      user-slot:
        interface: content
        source: user-data
      user-slot-2:
        interface: content
        source: user-data-2
  test-sdk-content:
    channel: latest/stable
    plugs:
      wp-plug:
        interface: content
        target: /mnt/wp-plug
connections:
  - plug: test-sdk-content:content-plug-one
    slot: host:user-slot
  - plug: test-sdk-content:content-plug-two
    slot: host:user-slot-2
  - plug: test-sdk-content:wp-plug
    slot: host:user-slot-2
