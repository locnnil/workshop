summary: Ensure the changes command output correctness
environment:
  WORKSHOPS: $SPREAD_PATH/tests/lib/workshops-empty
prepare: |
  . "$TESTSLIB"/utils.sh
  install_workshopd

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup "$WORKSHOPS"
  uninstall_workshopd

execute: |
  . "$TESTSLIB"/utils.sh

  echo "workshop changes will not produce any output if there are no changes"
  changes_global | MATCH "^$"

  project="$WORKSHOPS"/test-empty-ubuntu20
  launch $project ws

  echo "The launch change must present in the list"
  changes $project | MATCH "^1[[:space:]]+Done[[:space:]]+today[: [:alnum:]]+[[:space:]]+Launch \"ws\" workshop$"
