summary: Ensure the changes command output correctness
prepare: |
  # make sure there is no existing changes
    rm -f "$WORKSPACE"/state.json
    go install -buildvcs=false /remote/cmd/workspaced
    install /remote/cmd/workspaced/workspaced.service /etc/systemd/system/
    systemctl start workspaced

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup "$WORKSPACES"
  systemctl stop workspaced
  rm -f /etc/systemd/system/workspaced.service
  rm -f "$HOME"/go/bin/workspaced

execute: |
  . "$TESTSLIB"/utils.sh

  echo "workspace changes will not produce any output if there are no changes"
  changes_global | MATCH "^$"

  project="$WORKSPACES"/test-empty-ubuntu20
  launch $project ws

  echo "The launch change must present in the list"
  changes $project | MATCH "^1[[:space:]]+Done[[:space:]]+today[: [:alnum:]]+$project[[:space:]]+Launch workspace.*$"
