summary: Check workshop remove
environment:
  WORKSHOPS: $SPREAD_PATH/tests/lib
  project:  $WORKSHOPS/workshops-sdk/test-sdk-basic
prepare: |
  . "$TESTSLIB"/utils.sh
  install_workshopd
  cp "$project"/.workshop.ws.yaml "$project"/.workshop.ws.yaml.bak


restore: |
  . "$TESTSLIB"/utils.sh
  cleanup "$WORKSHOPS"
  uninstall_workshopd
  mv "$project"/.workshop.ws.yaml.bak "$project"/.workshop.ws.yaml

debug: |
  lxc list -f compact --all-projects
  workshop changes
  workshop tasks 1

execute: |
  . "$TESTSLIB"/utils.sh

  echo "Launch a workshop"
  workshop_exec launch --project $project ws

  echo "Check the workshop can be removed if in Ready"
  workshop_exec remove --project $project ws
  list "$project" | NOMATCH "^.+[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"

  echo "Check the workshop can be removed if in Stopped"
  workshop_exec launch --project $project ws
  workshop_exec stop --project $project ws
  workshop_exec remove --project $project ws
  list "$project" | NOMATCH "^.+[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"

  echo "Check the workshop can be removed if in Error"
  workshop_exec launch --project $project ws
  rm -f "$project"/.workshop.ws.yaml
  workshop_exec remove --project $project ws
  list "$project" | NOMATCH "^.+[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"
