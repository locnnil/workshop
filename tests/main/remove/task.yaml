summary: Check workshop remove
restore: |
  . "$TESTSLIB"/utils.sh

  workshop_exec warnings
  workshop_exec okay || true
execute: |
  . "$TESTSLIB"/utils.sh

  echo "Launch a workshop"
  workshop_exec launch ws-remove

  echo "Modify apt cache for later"
  workshop_exec exec ws-remove sudo touch /var/cache/apt/archives/sentinel

  echo "Check the workshop can be removed if in Ready"
  workshop_exec remove ws-remove
  workshop_exec list | MATCH "^ws-remove[[:space:]]+Off[[:space:]]+-$"

  echo "Check the apt cache was removed"
  workshop_exec launch ws-remove
  workshop_exec exec ws-remove sudo test ! -f /var/cache/apt/archives/sentinel

  echo "Check the workshop can be removed if in Stopped"
  workshop_exec stop ws-remove
  workshop_exec remove ws-remove
  workshop_exec list | MATCH "^ws-remove[[:space:]]+Off[[:space:]]+-$"
  
  echo "Check the workshop can be removed and SDKs disconnected"
  workshop_exec launch ws-remove-mount
  workshop_exec remove ws-remove-mount
  workshop_exec list | MATCH "^ws-remove-mount[[:space:]]+Off[[:space:]]+-$"

  echo "Check the workshop can be removed if waiting on refresh"
  workshop_exec launch ws-remove
  cp .workshop/ws-remove.yaml .workshop/ws-remove.yaml.old
  cat <<EOF >> .workshop/ws-remove.yaml
  sdks:
    - name: test-sdk-setup-fail
  EOF
  ! workshop_exec refresh --wait-on-error ws-remove || false
  workshop_exec remove ws-remove

  echo "Check the workshop can be removed if waiting on launch"
  ! workshop_exec launch --wait-on-error ws-remove || false
  workshop_exec remove ws-remove
  mv .workshop/ws-remove.yaml.old .workshop/ws-remove.yaml
  workshop_exec list | MATCH "^ws-remove[[:space:]]+Off[[:space:]]+-$"

  echo "Check the workshop can be removed if in Error"
  workshop_exec launch ws-remove
  workshop_exec list | MATCH "^ws-remove[[:space:]]+Ready[[:space:]]+-$"
  rm -f .workshop/ws-remove.yaml
  workshop_exec remove ws-remove
