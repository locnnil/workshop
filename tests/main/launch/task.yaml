summary: Test 'workshop launch' for the supported workshop bases

environment:
  WORKSHOPS: $SPREAD_PATH/tests/lib/workshops-empty

prepare: |
  . "$TESTSLIB"/utils.sh
  install_workshopd

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup "$WORKSHOPS"
  uninstall_workshopd

debug: |
  lxc project switch workshop.ubuntu
  lxc list -f compact
  ls "$WORKSHOPS"/*

execute: |
  . "$TESTSLIB"/utils.sh

  echo "Test launch for all the supported bases"
  for path in "$WORKSHOPS"/*; do
    launch "$path" ws
    list "$path" | MATCH "$path[[:space:]]*ws[[:space:]]*Ready[[:space:]]*-"
  done
