summary: Test 'workspace launch' for the supported workspace bases

environment:
  WORKSPACES: $SPREAD_PATH/tests/lib/workspaces-empty

prepare: |
  . "$TESTSLIB"/utils.sh
  install_workspaced

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup "$WORKSPACES"
  uninstall_workspaced

debug: |
  lxc project switch workspace.ubuntu
  lxc list -f compact
  ls "$WORKSPACES"/*

execute: |
  . "$TESTSLIB"/utils.sh

  echo "Test launch for all the supported bases"
  for path in "$WORKSPACES"/*; do
    launch "$path" ws
    list "$path" | MATCH "$path[[:space:]]*ws[[:space:]]*Ready[[:space:]]*-"
  done
