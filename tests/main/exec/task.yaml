summary: Check major workshop exec scenarios
prepare: |
  . "$TESTSLIB"/utils.sh
  workshop_exec launch
restore: |
  . "$TESTSLIB"/utils.sh
  workshop_exec remove
execute: |
  . "$TESTSLIB"/utils.sh

  echo "Check exec argument parsing"
  workshop_exec exec ws-exec -- echo -e '\x66oo' | MATCH foo
  workshop_exec exec ws-exec echo -e '\x66oo' | MATCH foo
  workshop_exec exec -- echo -e '\x66oo' | MATCH foo
  workshop_exec exec -i echo -e '\x66oo' | MATCH foo
  ! workshop_exec exec -I echo -e '\x66oo' || false
  workshop_exec exec ws-exec -- echo -- -e '\x66oo' | MATCH '^-- -e \\x66oo$'
  workshop_exec exec ws-exec echo -- -e '\x66oo' | MATCH '^-- -e \\x66oo$'
  workshop_exec exec -- echo -- -e '\x66oo' | MATCH '^-- -e \\x66oo$'
  ! workshop_exec exec echo -- -e '\x66oo' || false

  echo "Check exec summaries show the user command"
  workshop_exec exec -I ws-exec -- /bin/echo command-prefix-summary-check | MATCH '^command-prefix-summary-check$'
  change_id="$(workshop_exec changes --no-headers | awk 'END{print $1}')"
  workshop_exec changes --no-headers |
    awk 'END{print}' |
    MATCH 'Execute command "/bin/echo"$'
  workshop_exec tasks --no-headers "$change_id" |
    MATCH 'Exec command "/bin/echo"$'
  workshop_exec changes --no-headers |
    awk 'END{print}' |
    NOMATCH 'Execute command "sudo"$'
  workshop_exec tasks --no-headers "$change_id" |
    NOMATCH 'Exec command "sudo"$'

  echo "Check an environment variable can be set"
  workshop_exec exec --env 'Foo=bar' ws-exec bash -c '[ "$Foo" = bar ]'

  echo "Check that environment variables are inherited"
  sudo -u ubuntu 2>&1 -- env Foo=bar workshop exec --env Foo ws-exec bash -c '[ "$Foo" = bar ]'
  sudo -u ubuntu 2>&1 -- env Foo= workshop exec --env Foo -- bash -c '[ -z "${Foo-x}" ]'
  sudo -u ubuntu 2>&1 -- env --unset=Foo workshop exec --env Foo ws-exec bash -c '[ -z "${Foo+x}" ]'

  echo "Check environment variables from interfaces are present"
  workshop_exec exec -- env | MATCH FOO=BAR

  echo "Check default user and group"
  workshop_exec exec -- bash -c 'id -u -n' | MATCH workshop
  workshop_exec exec ws-exec bash -c 'id -g -n' | MATCH workshop

  echo "Check working directory setup"
  workshop_exec exec ws-exec pwd | MATCH '/project'
  workshop_exec exec -w /home/workshop -- pwd | MATCH '/home/workshop'

  echo "Check enforce non-interactive mode"
  workshop_exec exec -I ws-exec bash -c '[[ -t 1 ]] || echo -n nonterminal' | MATCH nonterminal

  #FIXME: this works in a terminal but not under spread This is due to the
  #websocket client implementation that closes the connection when a reader from
  #stdin has nothing to read. spread runs all commands with </dev/null which
  #results in EOF in stdin immediately. As a result, the written stdout buffer
  #is not read by the client as the reading go routine has closed the connection
  #by the time already (note: it is only relevant for the interactive sessions
  #where one websocket used for in/out)
  #echo "Check enforce interactive mode"
  #workshop_exec exec --interactive ws-exec bash -c 'echo -n terminal' | MATCH terminal

  echo "Check timeout"
  workshop_exec exec --timeout 1s -- sleep 5 | MATCH ".*timed out after 1s.*"

  echo "Check stderr (workshop exec redirects stderr to stdout for MATCH to work)"
  workshop_exec exec -I ws-exec bash -c '>&2 echo -n stderr' | MATCH stderr

  echo "Check exit code (125 is used by git bisect run)"
  exitcode=0
  workshop_exec exec ws-exec bash -c 'exit 125' || exitcode="$?"
  [ "$exitcode" -eq 125 ]

  echo "Check actions"
  workshop_exec run -- oneline | MATCH '^one line$'
  workshop_exec run ws-exec multiline > multiline.log
  MATCH '^multi$' < multiline.log
  MATCH '^line$' < multiline.log
  ! workshop_exec run ws-exec fail || false
  workshop_exec run -- file | MATCH '^script$'
  workshop_exec run -- env | MATCH 'FOO=BAR' 

  echo "Check actions can be updated without refreshing"
  sed -i 's/one line/1 LINE/g' workshop.yaml
  workshop_exec run ws-exec oneline | MATCH '^1 LINE$'
  sed -i 's/oneline/line1/' workshop.yaml
  workshop_exec run -- line1 | MATCH '^1 LINE$'

  echo "Check install-action error message"
  workshop_exec exec --uid 0 --gid 0 -- rm -f /var/lib/workshop/run/actions/line1
  workshop_exec exec --uid 0 --gid 0 -- mkdir /var/lib/workshop/run/actions/line1
  ! workshop_exec run ws-exec line1 > line1.log || false
  MATCH '^error: cannot perform the following tasks:$' < line1.log
  MATCH '^- Install action "line1" \(.*\)$' < line1.log

  echo "Check stopped workshop"
  workshop_exec stop
  workshop_exec exec ws-exec pwd | MATCH '.*cannot exec command in "ws-exec": not running$'
