summary: Check major workspace exec scenarios
environment:
  WORKSPACES: $SPREAD_PATH/tests/lib
  WORKSPACED_DEBUG: 1
prepare: |
  . "$TESTSLIB"/utils.sh
  install_workspaced

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup "$WORKSPACES"
  uninstall_workspaced

debug: |
  workspace changes

execute: |
  . "$TESTSLIB"/utils.sh

  echo "Launch a workspace"
  project="$WORKSPACES"/workspaces-sdk/test-sdk-basic
  launch $project ws

  echo "Check an environment variable can be set"
  workspace_exec exec --project $project --env 'Foo=bar'  ws -- bash -c 'echo -n $Foo' | MATCH bar

  echo "Check default user and group"
  workspace_exec exec --project $project ws -- bash -c 'id -u -n' | MATCH workspace
  workspace_exec exec --project $project ws -- bash -c 'id -g -n' | MATCH workspace

  echo "Check working directory setup"
  workspace_exec exec --project $project ws -- pwd | MATCH '/project'
  workspace_exec exec --project $project -w /home/workspace ws -- pwd | MATCH '/home/workspace'

  echo "Check enforce non-interactive mode"
  workspace_exec exec --project $project -I ws -- bash -c '[[ -t 1 ]] || echo -n nonterminal' | MATCH nonterminal

  #FIXME: this works in a terminal but not under spread This is due to the
  #websocket client implementation that closes the connection when a reader from
  #stdin has nothing to read. spread runs all commands with </dev/null which
  #results in EOF in stdin immediately. As a result, the written stdout buffer
  #is not read by the client as the reading go routine has closed the connection
  #by the time already (note: it is only relevant for the interactive sessions
  #where one websocket used for in/out)
  #echo "Check enforce interactive mode"
  #workspace_exec exec --project $project --interactive ws -- bash -c 'echo -n terminal' | MATCH terminal

  echo "Check timeout"
  workspace_exec exec --project $project --timeout 1s ws -- bash -c 'sleep 5' || true
  workspace_exec tasks 8 | MATCH ".*timed out after 1s.*"

  echo "Check stderr (workspace exec redirects stderr to stdout for MATCH to work)"
  workspace_exec exec --project $project -I ws -- bash -c '>&2 echo -n stderr' | MATCH stderr

  echo "Check stopped workspace"
  workspace_exec stop --project $project ws
  workspace_exec exec --project $project ws pwd | MATCH '.*"ws" is in stopped; must be ready or pending$'
