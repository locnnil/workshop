summary: Check that shell completion is installed with the snap
prepare: |
  . "$TESTSLIB"/utils.sh
  workshop_exec launch ws-comp
restore: |
  . "$TESTSLIB"/utils.sh
  workshop_exec remove ws-comp || true
execute: |
  . "$TESTSLIB"/utils.sh

  sudo -u ubuntu -- bash -l bash.sh
  sudo -u ubuntu -- bash -l zsh.sh
  sudo -u ubuntu -- bash -l fish.sh
