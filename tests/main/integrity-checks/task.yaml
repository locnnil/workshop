summary: Error states tracking and recovery for the .workshop.lock
restore: |
  . "$TESTSLIB"/utils.sh
  cleanup ./
  rm -rf ./new-project
execute: |
  . "$TESTSLIB"/utils.sh
  
  PROJECT=$(pwd)/project

  workshop_exec --project "$PROJECT" launch ws

  echo "Check recover .lock file if removed for an existing project"
  rm -f "$PROJECT"/.workshop.lock
  workshop_exec --project "$PROJECT" list
  test -f "$PROJECT"/.workshop.lock

  echo "Check report a workshop state as Error if there is no workshop file"
  mv "$PROJECT"/.workshop.ws.yaml "$PROJECT"/.workshop.ws.yaml.bak
  workshop_exec --project "$PROJECT" list | MATCH "^$PROJECT[[:space:]]+ws[[:space:]]+Error[[:space:]]+missing-file$"
  mv "$PROJECT"/.workshop.ws.yaml.bak "$PROJECT"/.workshop.ws.yaml
  workshop_exec --project "$PROJECT" list | MATCH "^$PROJECT[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"
  
  workshop_exec remove --project "$PROJECT" ws
  
  echo "Check recreating project dir with the same name does not cause conflicts"
  mkdir -p ./new-project
  cp "$PROJECT"/.workshop.ws.yaml ./new-project/
  workshop_exec launch --project $(pwd)/new-project ws
  workshop_exec remove --project $(pwd)/new-project ws
  rm -rf ./new-project
  mkdir -p ./new-project
  cp "$PROJECT"/.workshop.ws.yaml ./new-project/
  workshop_exec launch --project $(pwd)/new-project/  ws
  workshop_exec list --project $(pwd)/new-project | MATCH "^$(pwd)/new-project[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"
  workshop_exec remove --project $(pwd)/new-project ws


  
  
  
