summary: Check workshop stop
environment:
  WORKSHOPS: $SPREAD_PATH/tests/lib
prepare: |
  . "$TESTSLIB"/utils.sh
  install_workshopd

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup "$WORKSHOPS"
  uninstall_workshopd

debug: |
  lxc list -f compact --all-projects
  workshop changes
  workshop tasks 1

execute: |
  . "$TESTSLIB"/utils.sh

  echo "Launch a workshop"
  project="$WORKSHOPS"/workshops-sdk/test-sdk-basic
  launch $project ws

  echo "Stop the workshop"
  workshop_exec stop --project $project ws

  echo "Check the workshop is in Stopped state"
  list "$project" | MATCH "^.+[[:space:]]+ws[[:space:]]+Stopped[[:space:]]+-$"

  echo "Check stopping the Stopped workshop does not result in error"
  workshop_exec stop --project $project ws

  echo "Check the workshop is in Stopped state"
  list "$project" | MATCH "^.+[[:space:]]+ws[[:space:]]+Stopped[[:space:]]+-$"
