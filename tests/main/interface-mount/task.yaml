summary: Check mount interface scenarios
prepare: |
  . "$TESTSLIB"/utils.sh
  resolve_branch workshop.yaml
  workshop_exec launch
restore: |
  . "$TESTSLIB"/utils.sh
  workshop_exec remove || true
execute: |
  . "$TESTSLIB"/utils.sh

  function validate_host_mounts() {
    test -d "$source_one" && test -d "$source_two"
    workshop_exec exec -- bash -c "mountpoint -q /mnt/one && mountpoint -q /opt/two"
  }

  echo "Check the mount interface plug can be installed and auto-connected"

  project_id=$(cat .workshop.lock)
  source_one="/home/ubuntu/.local/share/workshop/id/"$project_id"/ws-mount/mount/test-sdk-mount/one"
  source_two="/home/ubuntu/.local/share/workshop/id/"$project_id"/ws-mount/mount/test-sdk-mount/two"
  validate_host_mounts

  echo "Check the mount interface plugs auto-reconnected after refresh"
  workshop_exec refresh
  validate_host_mounts

  echo "Check the mount interface plugs auto-reconnected if refresh fails"
  sed -i 's/test-sdk-mount/test-sdk-setup-fail/g' workshop.yaml
  workshop_exec refresh || true
  sed -i 's/test-sdk-setup-fail/test-sdk-mount/g' workshop.yaml
  validate_host_mounts

  echo "Check manual connect/disconnect works"
  workshop_exec disconnect ws-mount/test-sdk-mount:one
  workshop_exec exec -- bash -c "! mountpoint -q /mnt/one"

  workshop_exec connect ws-mount/test-sdk-mount:one :mount
  workshop_exec connections ws-mount | MATCH "^mount.+ws-mount/test-sdk-mount:one.+:mount.+manual$"
  validate_host_mounts

  echo "Check workshop to workshop bind mount"
  workshop_exec connections ws-mount | MATCH "^mount.+ws-mount/test-sdk-mount:jobs.+:jobs.+-$"
  workshop_exec exec -- bash -c "mountpoint -q /etc/cron.weekly && test -f /etc/cron.weekly/job.sh"
  workshop_exec disconnect ws-mount/test-sdk-mount:jobs
  workshop_exec connections ws-mount | MATCH "^mount.+ws-mount/test-sdk-mount:jobs.+-.+-$"
  workshop_exec exec -- bash -c "! mountpoint -q /etc/cron.weekly && ! test -f /etc/cron.weekly/job.sh"

  echo "Check mounts specified with 'read-only: true' are read only"
  workshop_exec exec -- bash -c "sudo touch /test/tmp" && exit 1 || true
  workshop_exec exec -- bash -c "mountpoint -q /test"
  echo "Do the same for workshop to workshop bind mounts"
  workshop_exec exec -- bash -c "sudo touch /mnt/ro-plug" && exit 1 || true
  workshop_exec exec -- bash -c "sudo touch /opt/ro-slot/tmp"
  workshop_exec exec -- bash -c "test -f /mnt/ro-plug/tmp"

  echo "Check remove will clean up mount interface default locations"
  workshop_exec remove
  test ! -d "$source_one"
  test ! -d "$source_two"
  
  echo "Check mount respects XDG_DATA_HOME"
  sudo -u ubuntu XDG_RUNTIME_DIR=/run/user/1000 systemctl --user set-environment XDG_DATA_HOME=/home/ubuntu/mydata
  workshop_exec launch
  source_one="/home/ubuntu/mydata/workshop/id/"$project_id"/ws-mount/mount/test-sdk-mount_one"
  source_two="/home/ubuntu/mydata/workshop/id/"$project_id"/ws-mount/mount/test-sdk-mount_two"
  validate_host_mounts

  echo "Check remove will clean up mount interface locations overridden with XDG_DATA_HOME"
  workshop_exec remove
  test ! -d "$source_one"
  test ! -d "$source_two"
  sudo -u ubuntu XDG_RUNTIME_DIR=/run/user/1000 systemctl --user unset-environment XDG_DATA_HOME
