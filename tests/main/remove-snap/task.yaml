summary: Check "snap remove workshop" removes all workshops
priority: -100
restore: |
  workshop_exec remove --project $(pwd)/project-1 ws-snap-remove-1 || true
  workshop_exec remove --project $(pwd)/project-1 ws-snap-remove-1a || true
  workshop_exec remove --project $(pwd)/project-2 ws-snap-remove-2 || true
  workshop_exec remove --project $(pwd)/project-2 ws-snap-remove-2a || true
execute: |
  # shellcheck source=tests/lib/utils.sh
  . "$TESTSLIB"/utils.sh

  workshop_exec launch --project $(pwd)/project-1 ws-snap-remove-1 ws-snap-remove-1a
  workshop_exec launch --project $(pwd)/project-2 ws-snap-remove-2 ws-snap-remove-2a

  echo "Modify apt cache for later"
  workshop_exec exec --project $(pwd)/project-1 ws-snap-remove-1 sudo touch /var/cache/apt/archives/sentinel

  echo "Run workshop as another user to have multiple LXD projects"
  sudo useradd -m -s /bin/bash abc
  sudo -u abc 2>&1 -- workshop list --project $(pwd)/project-1 

  echo "Check that workshops will be removed on snap removal"       
  snap remove workshop
  sudo deluser --remove-home abc

  echo "Check that workshop storage pool has been removed"
  (lxc storage list -f compact | awk 'NR>1 {print $1}' | (! grep -q workshop)) || (echo "workshop storage pool must be removed" && exit 1)
  (lxc network list -f compact | awk 'NR>1 {print $1}' | (! grep -q workshopbr0)) || (echo "workshop network must be removed" && exit 1)

  echo "Check that shell completion files have been removed"
  [ ! -f /var/lib/snapd/desktop/bash-completion/completions/workshop ]
  [ ! -f /var/lib/snapd/desktop/fish/vendor_completions.d/workshop.fish ]
  [ ! -f /usr/local/share/zsh/site-functions/_workshop ]
  # Should not exist, or maybe something else is using it
  ! rmdir /var/lib/snapd/desktop/fish
  ! rmdir /usr/local/share/zsh

  snap install --dangerous --classic /workshop/tests/*.snap
  [[ $(workshop_exec list --global | wc -c) -eq 0 ]] || (echo "no workshops must remain after snap removal" && exit 1)

  echo "Check that cache storage has been removed"
  workshop_exec launch --project $(pwd)/project-1 ws-snap-remove-1
  workshop_exec exec --project $(pwd)/project-1 ws-snap-remove-1 sudo test ! -f /var/cache/apt/archives/sentinel
