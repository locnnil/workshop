summary: Check workshop hack
prepare: |
  . "$TESTSLIB"/utils.sh
  workshop_exec launch ws-hack
restore: |
  . "$TESTSLIB"/utils.sh
  workshop_exec hack --drop ws-hack
  workshop_exec remove ws-hack
execute: |
  . "$TESTSLIB"/utils.sh

  echo "Install empty hack SDK"
  sudo TERM=ansi EDITOR=ex -u ubuntu -- workshop hack ws-hack <<EOF  
  wq
  EOF

  workshop_exec info ws-hack | grep -v notes | yq '.content["hack"].channel' | MATCH ".*(x1)"

  workshop_exec hack --drop ws-hack
  workshop_exec info ws-hack | grep -v notes | yq '.content["hack"].channel' | NOMATCH ".*(x1)"

  workshop_exec hack --restore ws-hack
  workshop_exec info ws-hack | grep -v notes | yq '.content["hack"].channel' | MATCH ".*(x1)"

  echo "Add setup-base"
  sudo TERM=ansi EDITOR=ex -u ubuntu -- workshop hack ws-hack setup-base <<EOF
  i
  mkdir -p /home/workshop/ws-hack-test
  .
  wq
  EOF

  workshop_exec info ws-hack | grep -v notes | yq '.content["hack"].channel' | MATCH ".*(x2)"

  echo "Add a new mount"
  sudo TERM=ansi EDITOR=ex -u ubuntu -- workshop hack ws-hack <<EOF
  $
  a
  plugs:
    hack-plug:
      interface: mount
      workshop-target: /home/workshop/ws-hack-test
  .
  wq
  EOF

  workshop_exec info ws-hack | grep -v notes | yq '.content["hack"].channel' | MATCH ".*(x3)"
  workshop_exec connections ws-hack | MATCH "*.ws-hack/hack:hack-plug.*:mount"
  workshop_exec exec ws-hack -- bash -c "test -d /home/workshop/ws-hack-test"
