summary: |
  Test workshop info output
  
prepare: |
  apt install expect jq -y --no-install-recommends
  snap install yq

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup ./

execute: |
  . "$TESTSLIB"/utils.sh
  PROJECT=$(pwd)
  
  workshop_exec --project "$PROJECT" launch ws --no-wait
  expect -f ./health.exp
