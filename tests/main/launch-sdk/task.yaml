summary: Ensure that launch creates a core LXD config correctly
execute: |
  . "$TESTSLIB"/utils.sh

  echo "Check workshop can be launched with a basic SDK"
  workshop_exec launch --verbose
  workshop_exec list | MATCH "ws-basic[[:space:]]*Ready[[:space:]]*-"

  # Check setup-project is run using bash -x
  workshop_exec tasks | MATCH "\\+ echo 'setup-project ran successfully\!'\$"

  # Ensure there is one installed SDK that was provided in the workshop definition
  workshop_exec info | yq ".sdks | length == 1"
  workshop_exec info | yq '.sdks["test-sdk-basic-2"].tracking' | MATCH "latest/stable"
  workshop_exec info | yq '.sdks["test-sdk-basic-2"].installed' | MATCH '^1\.0[[:space:]]+[0-9]{4}-[0-9]{2}-[0-9]{2}[[:space:]]+\([[:digit:]]+\)$'

  workshop_exec remove
