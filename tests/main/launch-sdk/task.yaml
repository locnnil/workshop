summary: Ensure that 'workspace launch' creates a core LXD config correctly
environment:
  WORKSPACES_SDK: $SPREAD_PATH/tests/lib/workspaces-sdk

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup "$WORKSPACES_SDK"
  uninstall_workspaced

prepare: |
  . "$TESTSLIB"/utils.sh
  install_workspaced

debug: |
  lxc project switch workspace.ubuntu
  lxc list -f compact
  ls "$WORKSPACES_SDK"/*

execute: |
  . "$TESTSLIB"/utils.sh

  echo "Launch a test workspace with an SDK should succeed"
  path="$WORKSPACES_SDK"/test-sdks-ubuntu22
  launch "$path" ws
  list "$path" | MATCH "$path[[:space:]]*ws[[:space:]]*Ready[[:space:]]*-"

  echo "SDKs must be configured correctly"
  # TODO reimplement using the workspace info when ready
  project_id=$(cat "$path"/.workspace.lock)
  info=$(sudo -u ubuntu curl -X GET -sS --unix-socket "$WORKSPACE"/.workspace.socket http://localhost/v1/projects/"$project_id"/workspaces/ws)

  echo "$info" | jq ".result.content[0].name" | MATCH "sdk-1"
  echo "$info" | jq ".result.content[0].channel" | MATCH "latest/stable"

  echo "$info" | jq ".result.content[1].name" | MATCH "sdk-2"
  echo "$info" | jq ".result.content[1].channel" | MATCH "latest/stable"
