summary: Test workspace list with a --global flag on
environment:
  WORKSPACES: $SPREAD_PATH/tests/lib/workspaces-empty

prepare: |
  . "$TESTSLIB"/utils.sh
  install_workspaced

  for path in "$WORKSPACES"/*; do
    launch $path ws
  done
  lxc project switch workspace.ubuntu


debug: |
  lxc project switch workspace.ubuntu
  lxc list -f compact
  ls $WORKSPACES/*

restore: |
  . "$TESTSLIB"/utils.sh
  uninstall_workspaced

  cleanup "$WORKSPACES"
  for path in "$WORKSPACES"/{*-copy,*-new}; do
    rm -rf "$path"
  done

execute: |
  . "$TESTSLIB"/utils.sh
  echo "(1) make sure every required workspace present in the global list output"
  for path in "$WORKSPACES"/*; do
   list_global | MATCH "^$path[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"
  done

  echo "(2) move a directory and validate it has an updated path in the output"
  for path in "$WORKSPACES"/*; do
   sudo -u ubuntu mv "$path" "$path"-new
   list_global | MATCH "^$path-new[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"
   list_global | NOMATCH "^$path[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"
   sudo -u ubuntu mv "$path"-new "$path"
  done

  echo "(3) delete a directory and validate it has a correct state in the output"
  for path in "$WORKSPACES"/*; do
   sudo -u ubuntu cp -R "$path" "$path"-copy
   launch "$path"-copy ws
   rm -rf "$path"-copy
   list_global | MATCH "^$path-copy[[:space:]]+ws[[:space:]]+Error[[:space:]]+missing-project$"
  done
