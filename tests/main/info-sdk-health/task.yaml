summary: |
  Check 'workshop info' SDK health reporting
  
prepare: |
  sudo apt-add-repository universe
  apt install expect -y --no-install-recommends

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup ./

execute: |
  . "$TESTSLIB"/utils.sh
  PROJECT=$(pwd)  
  workshop_exec --project "$PROJECT" launch ws --no-wait
  sudo -u ubuntu 2>&1 -- expect -f ./health.exp
