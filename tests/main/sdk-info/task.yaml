summary: Test sdk info output
prepare: |
  sdk_info_volumes() {
    lxc storage volume list --columns n --format csv workshop config.user.sdk.name=test-sdk-info-1
  }
  sdk_info_volumes | xargs -n1 -r lxc storage volume delete workshop
restore: |
  . "$TESTSLIB"/utils.sh

  workshop_exec remove edge || true
  workshop_exec remove stable || true
execute: |
  . "$TESTSLIB"/utils.sh

  lines=$(wc -l < header.txt)

  echo "Test SDK info without any volumes"
  sdk_exec info test-sdk-info-1 > info.log
  diff -u header.txt <(head --lines="$lines" info.log)

  MATCH '[[:space:]]+latest/stable[[:space:]]+1\.0[[:space:]]+[0-9]{4}-[0-9]{2}-[0-9]{2}[[:space:]]+all[[:space:]]+[0-9]+[[:space:]]+[0-9]+B' < info.log
  MATCH '[[:space:]]+latest/candidate[[:space:]]+\^[[:space:]]*' < info.log
  MATCH '[[:space:]]+latest/beta[[:space:]]+\^[[:space:]]*' < info.log
  MATCH '[[:space:]]+latest/edge[[:space:]]+2\.0[[:space:]]+[0-9]{4}-[0-9]{2}-[0-9]{2}[[:space:]]+all[[:space:]]+[0-9]+[[:space:]]+[0-9]+B' < info.log

  echo "Test SDK info with one volume"
  workshop_exec launch edge
  sdk_exec list | MATCH '^test-sdk-info-1[[:space:]]+2\.0[[:space:]]+[[:digit:]]+[[:space:]]+.*kB$'

  sdk_exec info test-sdk-info-1 > info.log
  diff -u header.txt <(head --lines="$lines" info.log)
  MATCH '[[:space:]]+latest/stable[[:space:]]+1\.0[[:space:]]+[0-9]{4}-[0-9]{2}-[0-9]{2}[[:space:]]+all[[:space:]]+[0-9]+[[:space:]]+[0-9]+B' < info.log
  MATCH "$PWD[[:space:]]+edge[[:space:]]+latest/edge[[:space:]]+2\\.0[[:space:]]+all[[:space:]]+[[:digit:]]+$" < info.log

  echo "Test SDK info with two volumes"
  workshop_exec launch stable
  sdk_exec list | MATCH '^test-sdk-info-1[[:space:]]+1\.0[[:space:]]+[[:digit:]]+[[:space:]]+.*kB$'
  sdk_exec list | MATCH '^test-sdk-info-1[[:space:]]+2\.0[[:space:]]+[[:digit:]]+[[:space:]]+.*kB$'

  sdk_exec info test-sdk-info-1 > info.log
  diff -u header.txt <(head --lines="$lines" info.log)
  MATCH '[[:space:]]+latest/edge[[:space:]]+2\.0[[:space:]]+[0-9]{4}-[0-9]{2}-[0-9]{2}[[:space:]]+all[[:space:]]+[0-9]+[[:space:]]+[0-9]+B' < info.log
  MATCH "$PWD[[:space:]]+edge[[:space:]]+latest/edge[[:space:]]+2\\.0[[:space:]]+all[[:space:]]+[[:digit:]]+$" < info.log
  MATCH "[[:space:]]+stable[[:space:]]+latest/stable[[:space:]]+1\\.0[[:space:]]+all[[:space:]]+[[:digit:]]+$" < info.log

  echo "Test SDK info with two volumes but one workshop"
  workshop_exec remove edge
  sdk_exec list | MATCH '^test-sdk-info-1[[:space:]]+1\.0[[:space:]]+[[:digit:]]+[[:space:]]+.*kB$'
  sdk_exec list | MATCH '^test-sdk-info-1[[:space:]]+2\.0[[:space:]]+[[:digit:]]+[[:space:]]+.*kB$'

  sdk_exec info test-sdk-info-1 > info.log
  diff -u header.txt <(head --lines="$lines" info.log)
  MATCH "$PWD[[:space:]]+stable[[:space:]]+latest/stable[[:space:]]+1\\.0[[:space:]]+all[[:space:]]+[[:digit:]]+$" < info.log
