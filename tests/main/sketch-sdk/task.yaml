summary: Check workshop sketch-sdk
prepare: |
  . "$TESTSLIB"/utils.sh
  workshop_exec launch
restore: |
  . "$TESTSLIB"/utils.sh
  workshop_exec remove
execute: |
  . "$TESTSLIB"/utils.sh

  echo "Install empty sketch SDK"
  sudo TERM=ansi EDITOR=ex -u ubuntu -- workshop sketch-sdk <<EOF
  wq
  EOF

  workshop_exec info | grep -v notes | yq '.sdks["sketch"].tracking' | MATCH '^~/.local/share/workshop/project/.*/sdk/sketch/ws-sketch$'
  workshop_exec info | grep -v notes | yq '.sdks["sketch"].installed' | MATCH '\(x1\)$'

  echo "Stash current sketch SDK"
  workshop_exec sketch-sdk --stash
  workshop_exec info | grep -v notes | yq '.sdks["sketch"].installed' | NOMATCH '\(x1\)$'

  echo "Restore sketch SDK"
  workshop_exec sketch-sdk --restore
  workshop_exec info | grep -v notes | yq '.sdks["sketch"].installed' | MATCH '\(x1\)$'

  echo "Add setup-base"
  sudo TERM=ansi EDITOR=ex -u ubuntu -- workshop sketch-sdk <<EOF
  10
  i
    setup-base: |
      mkdir -p /home/workshop/ws-sketch-test
  .
  wq
  EOF

  workshop_exec info | grep -v notes | yq '.sdks["sketch"].installed' | MATCH '\(x2\)$'

  echo "Add a new mount"
  sudo TERM=ansi EDITOR=ex -u ubuntu -- workshop sketch-sdk <<EOF
  $
  a
    sketch-plug:
      interface: mount
      workshop-target: /home/workshop/ws-sketch-test
  .
  wq
  EOF

  workshop_exec info | grep -v notes | yq '.sdks["sketch"].installed' | MATCH '\(x3\)$'
  workshop_exec connections ws-sketch | MATCH "*.ws-sketch/sketch:sketch-plug.*:mount"
  workshop_exec exec -- test -d /home/workshop/ws-sketch-test

  echo "Remove the sketch"
  workshop_exec sketch-sdk --remove

  echo "Install empty sketch SDK"
  sudo TERM=ansi EDITOR=ex -u ubuntu -- workshop sketch-sdk <<EOF
  wq
  EOF

  echo "Add a breaking change to sketch"
  ! sudo TERM=ansi EDITOR=ex -u ubuntu -- workshop sketch-sdk <<EOF
  i
    plugs:
      test:
        interface: mount
  .
  wq
  EOF

  echo "Abort the change"
  workshop_exec refresh --abort
