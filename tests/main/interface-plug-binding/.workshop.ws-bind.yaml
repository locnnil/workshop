name: ws-bind
base: ubuntu@22.04
sdks:
  test-sdk-mount:
    channel: latest/stable
    plugs:
      two:
        bind: test-sdk-multiple-plugs:cache
  test-sdk-multiple-plugs:
    channel: latest/stable
    plugs:
      data:
        bind: test-sdk-mount:one
  test-sdk-ssh-agent:
    channel: latest/stable
    plugs:
      ssh-agent:
        bind: test-sdk-multiple-plugs:ssh-agent
