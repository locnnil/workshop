name: ws-bind
base: ubuntu@22.04
sdks:
  test-sdk-content:
    channel: latest/stable
    plugs:
      content-plug-two:
        bind: test-sdk-multiple-plugs:cache
  test-sdk-multiple-plugs:
    channel: latest/stable
    plugs:
      data:
        bind: test-sdk-content:content-plug-one
  test-sdk-ssh-agent:
    channel: latest/stable
    plugs:
      ssh-agent:
        bind: test-sdk-multiple-plugs:ssh-agent
