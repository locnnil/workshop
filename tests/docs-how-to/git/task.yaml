summary: Test 'How to use workshops with Git' to ensure it's operational
execute: |
  . "$TESTSLIB"/utils.sh
  PROJECT=$(pwd)
  lxc storage set default size=30GB

  # Initialization

  git config --global user.email "wsuser@example.com"
  git config --global user.name "Workshop User"
  git init original
  mv main.go workshop.yaml original/
  cd original/
  workshop_exec --project "$PROJECT/original" launch
  git add . && git commit -m "initial commit"
  chown -R ubuntu:ubuntu $PROJECT/original
  workshop_exec --project "$PROJECT/original" exec dev -- go build -x main.go
  workshop_exec --project "$PROJECT/original" remove
  $PROJECT/original/main
  workshop_exec --project "$PROJECT/original" launch
  echo ".workshop.lock" >> "$PROJECT/original/.gitignore"
  git config --global --add safe.directory "$PROJECT/original"


  # Use worktrees

  git worktree add $PROJECT/hotfix
  cd $PROJECT/hotfix/
  sed -i "s/22\.04/24.04/g" workshop.yaml
  sed -i "s/jammy/noble/g" workshop.yaml
  workshop_exec --project "$PROJECT/hotfix" launch
  sleep 1
  git commit -am "solve problem with hotfix"
  cd $PROJECT/original/
  git merge hotfix
  git worktree move $PROJECT/hotfix/ $PROJECT/resolved/
  workshop_exec list --global
  workshop_exec --project "$PROJECT/resolved" remove
  git worktree remove $PROJECT/resolved/
