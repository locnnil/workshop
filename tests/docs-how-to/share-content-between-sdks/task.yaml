summary: Test 'How to share content between SDKs' to ensure it's operational
restore: |
  . "$TESTSLIB"/utils.sh
  workshop_exec remove dev || true
execute: |
  . "$TESTSLIB"/utils.sh
  chown -R ubuntu:ubuntu .

  workshop_exec launch dev

  echo "The connections entry pairs toolbox:cache with the cachekit:shared slot"
  workshop_exec connections dev | MATCH "^mount.+dev/toolbox:cache.+dev/cachekit:shared.+-$"

  echo "toolbox reads the directory cachekit publishes, not a host directory"
  workshop_exec exec dev -- mountpoint -q /home/workshop/toolbox-cache
  workshop_exec exec dev -- cat /home/workshop/toolbox-cache/marker | MATCH "^cachekit$"

  echo "A mount plug not named in connections auto-connects to system:mount"
  workshop_exec connections dev | MATCH "^mount.+dev/toolbox:state.+dev/system:mount.+-$"

  echo "Without the connections entry, toolbox:cache falls back to system:mount"
  cp dev.no-conns.yaml .workshop/dev.yaml
  chown ubuntu:ubuntu .workshop/dev.yaml
  workshop_exec refresh dev
  workshop_exec connections dev | MATCH "^mount.+dev/toolbox:cache.+dev/system:mount.+-$"

  echo "and cachekit:shared is then listed with no plug consuming it"
  workshop_exec connections dev | MATCH "^mount.+-.+dev/cachekit:shared.+-$"
