summary: Test 'How to connect your local VS Code to a workshop' to ensure it's operational
execute: |
  . "$TESTSLIB"/utils.sh

  # Launch the workshop with vscode-remote SDK

  workshop_exec launch
  workshop_exec list


  # Verify tasks output contains SSH connection information

  workshop_exec tasks | MATCH 'VS Code → Open Remote Window → Connect to host → workshop@'


  # Clean up

  workshop_exec remove
