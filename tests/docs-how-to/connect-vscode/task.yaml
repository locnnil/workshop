summary: Test 'How to connect your local VS Code to a workshop' to ensure it's operational
execute: |
  . "$TESTSLIB"/utils.sh

  # Launch the workshop with vscode-remote SDK

  workshop_exec launch
  workshop_exec list


  # Verify workshop info contains the hostname used for SSH connection information

  hostname="$(workshop_exec info dev | yq '.hostname')"
  test -n "$hostname"
  test "$hostname" != "null"
  echo "$hostname" | MATCH '^dev\..*\.wp$'


  # Clean up

  workshop_exec remove
