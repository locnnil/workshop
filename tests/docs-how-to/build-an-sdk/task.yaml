summary: |
  Verify the how_build_sdk procedure end-to-end:
  scaffold an SDK, lay down the five hooks, run sdkcraft try,
  launch a workshop with the try SDK, confirm the workshop is Ready
  (which means check-health reported okay and both setup-base and
  setup-project ran), verify sdkcraft test discovers the SDK's
  own spread tests, then mutate the workshop marker and refresh
  the try SDK to confirm save-state and restore-state carry the
  mutation across the refresh boundary.

  Note on scaffolding: the doc points new authors at canonical/template-sdk,
  which is the project skeleton plus CI/renovate glue. The test uses
  sdkcraft init instead because it produces the same sdkcraft.yaml and
  hooks/ skeleton without pulling in the CI workflows the test doesn't
  exercise.

prepare: |
  . "$TESTSLIB"/utils.sh
  install_sdkcraft

restore: |
  . "$TESTSLIB"/utils.sh
  cd ~ubuntu
  sudo -u ubuntu -- workshop --project ~ubuntu/build-demo-workshop remove 2>/dev/null || true
  rm -rf ~ubuntu/build-demo ~ubuntu/build-demo-workshop

execute: |
  . "$TESTSLIB"/utils.sh
  TESTROOT=$(pwd)

  # Scaffold the SDK source per the how-to: sdkcraft init, then replace the
  # default sdkcraft.yaml and hooks with the ones the doc walks through.
  mkdir ~ubuntu/build-demo
  chown ubuntu:ubuntu ~ubuntu/build-demo
  cd ~ubuntu/build-demo
  run_sdkcraft init
  rm -f hooks/*
  cp "$TESTROOT/sdkcraft.yaml" .
  cp "$TESTROOT/hooks/"* hooks/
  chmod 0755 hooks/*
  chown -R ubuntu:ubuntu .

  # Build the SDK and copy it into the try area.
  run_sdkcraft clean
  run_sdkcraft try

  # The Test the SDK section in the doc invokes sdkcraft test, which installs
  # Workshop from the store, so no local snap copy is needed.
  run_sdkcraft test --list | MATCH "main/launch"

  # Consume the try SDK from a fresh workshop project.
  mkdir ~ubuntu/build-demo-workshop
  chown ubuntu:ubuntu ~ubuntu/build-demo-workshop
  cp "$TESTROOT/workshop.yaml" ~ubuntu/build-demo-workshop/
  chown ubuntu:ubuntu ~ubuntu/build-demo-workshop/workshop.yaml
  cd ~ubuntu/build-demo-workshop
  workshop_exec launch --verbose

  # Workshop reaches Ready only if check-health reported okay, which
  # requires both setup-base and setup-project to have left their markers
  # and hello-build-demo to be on PATH.
  workshop_exec list | MATCH "dev[[:space:]]*Ready"

  # Verify the hook markers are present inside the workshop.
  workshop_exec exec dev -- test -f /var/lib/build-demo/setup-base.marker
  workshop_exec exec dev -- test -f /home/workshop/.build-demo.marker

  # Exercise save-state and restore-state by refreshing the try SDK.
  # Mutate the marker first so a successful round-trip is distinguishable
  # from setup-project just recreating its default content.
  workshop_exec exec dev -- sudo -u workshop sh -c \
      'echo "mutated-by-test" > /home/workshop/.build-demo.marker'

  # Workshop reuses an existing try SDK whose .sha3-384 digest matches,
  # so an unchanged sdkcraft try would make workshop refresh a no-op
  # (no destroy, no save-state, no restore-state). Bump the SDK version
  # to force a content change and therefore a new revision.
  sudo -u ubuntu sed -i 's/^version: "0.1.0"$/version: "0.1.1"/' \
      ~ubuntu/build-demo/sdkcraft.yaml
  (cd ~ubuntu/build-demo && run_sdkcraft try)

  # workshop refresh triggers: save-state on the old workshop,
  # destroy, setup-base + setup-project on the new workshop,
  # restore-state, then check-health.
  workshop_exec refresh

  # check-health gates Ready, so this proves the full cycle finished cleanly.
  workshop_exec list | MATCH "dev[[:space:]]*Ready"

  # The installed-revision count goes from (x1) to (x2) only when refresh
  # actually installed a new try revision, which is what makes save-state
  # and restore-state run.
  workshop_exec info | yq '.sdks["build-demo"].installed' | MATCH '\(x2\)$'

  # The mutation is restored only if save-state copied it to $SDK_STATE_DIR
  # and restore-state copied it back; setup-project would have written
  # "setup-project ran" instead.
  workshop_exec exec dev -- sudo -u workshop \
      grep -q "mutated-by-test" /home/workshop/.build-demo.marker

  workshop_exec remove
