summary: Ensure that workspace list renders a list of active workspaces for all projects correctly

prepare: |
  . "$TESTSLIB"/utils.sh

  for path in $WORKSPACES/*; do
    launch $path ws | MATCH started
  done
  lxc project switch workspace.ubuntu

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup_workspaces_in_tree $WORKSPACES
  for path in $WORKSPACES/{*-copy,*-new}; do
    rm -rf $path
  done

execute: |
  . "$TESTSLIB"/utils.sh
  # project-specific workspace list
  for path in $WORKSPACES/*; do
   list_all | MATCH "^$path[[:space:]]+ws[[:space:]]+Ready$"
  done

  # move a directory and validate it has an updated path in the output
  for path in $WORKSPACES/*; do
   mv $path $path-new
   list_all | MATCH "^$path-new[[:space:]]+ws[[:space:]]+Ready$"
   list_all | NOMATCH "^$path[[:space:]]+ws[[:space:]]+Ready$"
  done

  # delete a directory and validate it has a corres state in the output
  for path in $WORKSPACES/*; do
   rm -rf $path-new
   list_all | NOMATCH "^$path-new[[:space:]]+ws[[:space:]]+Ready$"
  done

