summary: Ensure that workspace list renders a list of active workspaces for all projects correctly

prepare: |
  . "$TESTSLIB"/utils.sh

  for path in "$WORKSPACES"/*; do
    launch $path ws | MATCH started
  done
  lxc project switch workspace.ubuntu


debug: |
  lxc project switch workspace.ubuntu
  lxc list -f compact
  ls $WORKSPACES/*

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup_workspaces_in_tree $WORKSPACES
  for path in $WORKSPACES/{*-copy,*-new}; do
    rm -rf $path
  done

execute: |
  . "$TESTSLIB"/utils.sh
  echo "(1) make sure every required workspace present in the global list output"
  for path in $WORKSPACES/*; do
   list_all | MATCH "^$path[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"
  done

  echo "(2) move a directory and validate it has an updated path in the output"
  for path in $WORKSPACES/*; do
   sudo -u ubuntu mv $path $path-new
   list_all | MATCH "^$path-new[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"
   list_all | NOMATCH "^$path[[:space:]]+ws[[:space:]]+Ready[[:space:]]+-$"
  done

  echo "(3) delete a directory and validate it has a correct state in the output"
  for path in $WORKSPACES/*; do
   sudo -u ubuntu cp -R $path $path-copy
   launch $path-copy ws
   rm -rf $path-copy
   list_all | MATCH "^$path-copy[[:space:]]+ws[[:space:]]+Error[[:space:]]+missing-project$"
  done

  # stop a workspace, move the directory, validate the correct list



  




