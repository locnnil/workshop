summary: Ensure that workspace list renders a list of active workspaces correctly

prepare: |
  . "$TESTSLIB"/utils.sh

  for path in $WORKSPACES/*; do
    launch $path ws | MATCH started
  done
  lxc project switch workspace.ubuntu

restore: |
  . "$TESTSLIB"/utils.sh
  cleanup_workspaces_in_tree $WORKSPACES
  for path in $WORKSPACES/{*-copy,*-new}; do
    rm -rf $path
  done

execute: |
  . "$TESTSLIB"/utils.sh
  # project-specific workspace list
  for path in $WORKSPACES/*; do
   list $path | MATCH "^.+[[:space:]]+ws[[:space:]]+Ready$"
    test -f $path/.workspace.lock
  done

  for path in $WORKSPACES/*; do
    # the directory was moved, its instances must update configuration with a new path
    sudo -u ubuntu mv $path $path-new
    project_id=`cat $path-new/.workspace.lock`
    list $path-new | MATCH "^${path}-new[[:space:]]+ws[[:space:]]+Ready$"
    assert_workspace_config $path-new $project_id

    # since the directory was copied, its projects instances should still stay available at the old path
    sudo -u ubuntu cp -R $path-new $path-copied
    list $path-copied | MATCH "^${path}-copied[[:space:]]+ws[[:space:]]+Inactive$"
    project_id_copied=`cat $path-copied/.workspace.lock`
    test $project_id_copied != $project_id 

    # make sure the instance at the old path still configured properly
    assert_workspace_config $path-new $project_id

    # launch from a new directory successfully 
    launch $path-copied ws | MATCH started
    list $path-copied | MATCH "^${path}-copied[[:space:]]+ws[[:space:]]+Ready$"
    assert_workspace_config $path-copied $project_id_copied

    #TODO: there is a case when we can break the above bahaviour:
    # mv dir dir-1
    # workspace --project /dir1 list
    # mv dir-1 dir
    # cp -R dir dir-copy
    # workspace --project /dir-copy list <- this will execute move semantics and old instances will be
    # moved to the /dir-copy which is wrong
  done

  # list --all



  




