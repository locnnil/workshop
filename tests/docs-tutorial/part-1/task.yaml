summary: Run tutorial part 1 commands to ensure it's operational
restore: |
  rm -rf ~/ollama-python-project
execute: |
  . "$TESTSLIB"/utils.sh

  # ----------------------------------------------------------------------------

  # Part 1: Get Started


  ## Define, add SDKs

  sdk_exec find ollama | MATCH '^ollama[[:space:]]'

  sdk_exec info ollama > sdk-info.log
  MATCH '^name:[[:space:]]+ollama$' < sdk-info.log
  MATCH '[[:space:]]+cpu/stable[[:space:]]' < sdk-info.log
  MATCH '[[:space:]]+vulkan/stable[[:space:]]' < sdk-info.log

  mkdir ollama-python-project/
  chown -R ubuntu:ubuntu ollama-python-project/
  cd ollama-python-project/
  git init 2>/dev/null || true

  # Scaffold the definition with `workshop init`.
  workshop_exec init dev --sdks ollama/cpu/stable --base ubuntu@22.04 | MATCH '"dev" workshop created at'
  MATCH '^name:[[:space:]]+dev$' < .workshop/dev.yaml
  MATCH '^base:[[:space:]]+ubuntu@22.04$' < .workshop/dev.yaml
  MATCH 'name:[[:space:]]+ollama$' < .workshop/dev.yaml
  MATCH 'channel:[[:space:]]+cpu/stable$' < .workshop/dev.yaml

  workshop_exec list
  lxc storage set workshop size=20GB


  ## Launch, start, and stop

  workshop_exec launch
  workshop_exec info
  sdk_exec list | MATCH '^ollama[[:space:]]'
  echo ".workshop.lock" >> .gitignore

  workshop_exec stop
  workshop_exec start


  ## Refresh a workshop

  sed -e "s/22.04/24.04/g" -e "s/cpu/vulkan/g" -i .workshop/dev.yaml
  workshop_exec refresh
  sdk_exec list | MATCH '^ollama[[:space:]]'


  ## Execute commands

  workshop_exec exec dev -- ollama pull tinyllama  # Non-interactive version
  workshop_exec exec dev -- ollama list


  ## Interactive shell

  workshop_exec exec dev bash -c "pwd"  # Non-interactive version
  workshop_exec exec dev bash -c "lsb_release -a"


  ## Reusable actions

  cat >> .workshop/dev.yaml <<'EOF'
  actions:
    pull: ollama pull "$@"
  EOF
  workshop_exec run dev -- pull tinyllama:latest


  ## Project directory updates

  touch created_outside.txt
  workshop_exec exec dev -- ls /project/
  workshop_exec exec dev test -f created_outside.txt
  workshop_exec exec dev -- touch /project/created_inside.txt
  [ -f "created_inside.txt" ]


  ## Track changes and tasks

  workshop_exec tasks $(workshop_exec changes | awk 'END{print $1}')
