summary: Run tutorial part 2 commands to ensure it's operational
restore: |
  rm -rf ~/ollama-python-project ~/.ollama
execute: |
  . "$TESTSLIB"/utils.sh

  mkdir ollama-python-project/

  chown -R ubuntu:ubuntu ollama-python-project/
  cd ollama-python-project/
  cp ../workshop-part-2.yaml workshop.yaml
  workshop_exec launch
  lxc storage set workshop size=20GB

  # ----------------------------------------------------------------------------

  # Part 2: Interfaces


  ## Manage connections

  workshop_exec connections

  workshop_exec disconnect dev/ollama:models
  workshop_exec connections
  workshop_exec connect dev/ollama:models :mount
  workshop_exec connections

  mkdir -p ~/.ollama/models
  workshop_exec remount dev/ollama:models ~/.ollama/models
  workshop_exec info


  ## Add plugs, slots

  cat >> workshop.yaml <<EOF
    - name: jupyter
      channel: latest/edge
    - name: system
      plugs:
        jupyter:
          interface: tunnel
          endpoint: 127.0.0.1:8989
  EOF
  workshop_exec connections --all
  workshop_exec refresh
  workshop_exec info
  retry 5 curl -w '\n' http://127.0.0.1:8989/api
