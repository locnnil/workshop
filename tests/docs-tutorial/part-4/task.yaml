summary: Run tutorial part 4 commands to ensure it's operational
restore: |
  rm -rf ~/ollama
execute: |
  . "$TESTSLIB"/utils.sh
  lxc storage set default size=32GB

  # ----------------------------------------------------------------------------

  ## Part 4: Craft SDKs

  run_sdkcraft --help
  mkdir ollama/ && cd ollama/
  run_sdkcraft init
  mv ../{sdk.yaml,ollama.service} .
  mkdir hooks
  mv ../{setup-base,save-state,restore-state,check-health,setup-project} hooks/
  # TODO: remove when fixed: https://github.com/canonical/craft-providers/issues/856
  if lxc project info sdkcraft &>/dev/null; then
    run_sdkcraft clean
  fi
  run_sdkcraft pack
  run_sdkcraft try
