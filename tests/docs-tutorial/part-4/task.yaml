summary: Run tutorial part 4 commands to ensure it's operational
restore: |
  rm -rf ~/ollama
execute: |
  . "$TESTSLIB"/utils.sh
  lxc storage set default size=32GB

  # ----------------------------------------------------------------------------

  ## Part 4: Craft SDKs

  run_sdkcraft --help
  mkdir ollama/ && cd ollama/
  chown ubuntu:ubuntu .
  run_sdkcraft init
  rm hooks/*
  mv ../{sdkcraft.yaml,ollama.service} .
  mv ../{setup-base,check-health,setup-project} hooks/
  run_sdkcraft clean
  run_sdkcraft try
