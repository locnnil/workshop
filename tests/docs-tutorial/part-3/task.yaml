summary: Run tutorial part 3 commands to ensure it's operational
restore: |
  rm -rf ~/ollama-python-project ~/.ollama
execute: |
  . "$TESTSLIB"/utils.sh

  mkdir ollama-python-project/

  chown -R ubuntu:ubuntu ollama-python-project/
  cd ollama-python-project/
  git init 2>/dev/null || true
  workshop_exec init dev --sdks ollama/vulkan/stable,jupyter --base ubuntu@24.04
  cat >> .workshop/dev.yaml <<EOF
      - name: system
        plugs:
          jupyter:
            interface: tunnel
            endpoint: 127.0.0.1:8989
  EOF
  cp ../run-ollama.py .
  workshop_exec launch
  lxc storage set workshop size=20GB

  # ----------------------------------------------------------------------------

  # Part 3: Sketch SDKs


  ## Start sketching

  sudo TERM=ansi EDITOR=ex -u ubuntu -- workshop sketch-sdk <<EOF
  1/^    # uv sync$/c
      source /var/lib/workshop/sdk/jupyter/venv/bin/activate
      pip install jupyter-console requests
  .
  wq
  EOF

  workshop_exec info | yq '.sdks["sketch"].installed' | MATCH '\(x1\)$'

  workshop_exec exec dev -- ollama pull tinyllama
  workshop_exec exec dev -- /var/lib/workshop/sdk/jupyter/venv/bin/python /project/run-ollama.py


  ## Stash and restore

  workshop_exec sketch-sdk --stash
  workshop_exec sketch-sdk --restore


  ## Explore sketches

  workshop_exec sketches


  ## Convert to in-project SDK

  workshop_exec sketch-sdk --eject --name console
  [ -f .workshop/console/sdk.yaml ]

  git config --global --add safe.directory '*'
  git add .workshop/
  git commit -m "Add jupyter-console in-project SDK"


  ## Clean up

  workshop_exec sketch-sdk --remove
  workshop_exec remove
