repos:
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.3
    hooks:
      - id: golangci-lint
      - id: golangci-lint
        alias: golangci-incremental
        name: golangci-incremental
        args:
          - --config=.golangci.incremental.yaml

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor
        args: [--fix=safe]

  - repo: local
    hooks:
      - id: docs-check
        name: Run docs check with Workshop
        entry: make -C docs/ spelling linkcheck woke lint-md
        language: system
        pass_filenames: false
        files: ^docs/.*\.(rst|md|txt|json)$

      - id: quote-style
        name: Check quotation style in fmt calls
        entry: .github/scripts/check-quote-style.sh
        language: system
        types: [go]
        exclude: '(_test\.go$|^internal/jsonutil/safejson/)'
