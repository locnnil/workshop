version: '2'

formatters:
  enable:
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - Prefix(github.com/canonical/workshop)

linters:
  disable:
    - errcheck
  enable:
    - nilerr
    - unparam
  settings:
    staticcheck:
      dot-import-whitelist:
        - github.com/canonical/workshop/internal/overlord/handlersetup
  exclusions:
    rules:
      - path: _test\.go$
        linters: [unparam]
        text: always receives (".*"|[0-9]+)$

issues:
  # these values ensure that all issues will be surfaced
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  build-tags: [integration]
  timeout: 5m
