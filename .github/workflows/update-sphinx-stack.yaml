name: Update Sphinx Stack

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Mondays

permissions:
  contents: write
  pull-requests: write

jobs:
  update-sphinx-stack:
    runs-on: ubuntu-22.04

    steps:
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: true

      - name: Checkout Sphinx Stack repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: canonical/sphinx-stack
          path: sphinx-stack-temp
          persist-credentials: false

      - name: Update Sphinx Stack files
        run: |
          # Clean up any previous installation
          make -C docs clean
          rm -rf docs/{Makefile,_dev}

          # Copy the Makefile and _dev directory to the project's docs directory.
          # Stack-managed files only — conf.py, .gitignore, .readthedocs.yaml,
          # _templates/, redirects.txt remain project-managed.
          cp -a sphinx-stack-temp/docs/{Makefile,_dev} docs/

          # Merge requirements from input files to locked output file
          uv pip compile --universal \
            docs/requirements.in \
            sphinx-stack-temp/docs/requirements.txt \
            --output-file docs/requirements.txt

          # Get the latest commit hash from the Sphinx Stack
          cd sphinx-stack-temp
          SPHINX_STACK_COMMIT=$(git rev-parse --short HEAD)
          echo "SPHINX_STACK_COMMIT=$SPHINX_STACK_COMMIT" >> $GITHUB_ENV
          cd ..

          # Clean up the temporary checkout
          rm -rf sphinx-stack-temp

          echo "Sphinx Stack files updated successfully"

      - name: Install documentation dependencies
        run: make -C docs install

      - name: Check for changes, commit, and create PR if any
        run: |
          if git diff --exit-code; then
            echo "No changes detected, skipping commit and PR creation."
          else
            pr_branch="docs/update-sphinx-stack-${SPHINX_STACK_COMMIT}-$(date +'%Y%m%d%H%M%S')"
            git checkout -b $pr_branch

            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'

            git add .
            git commit -m "Update Sphinx Stack files"
            git push --set-upstream origin $pr_branch

            gh pr create --title "Update Sphinx Stack files" --body "This PR updates the Sphinx Stack files from the upstream repository (canonical/sphinx-stack)." --base main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
