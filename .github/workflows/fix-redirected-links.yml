name: Fix redirected links

on:
  workflow_dispatch:
    inputs:
      redirect_codes:
        description: "Comma-separated HTTP redirect codes to process"
        required: false
        default: "301,308"
        type: string
      max_redirects:
        description: "Maximum redirects to fix per run"
        required: false
        default: 3
        type: number
      verify_links:
        description: "Verify updated links are reachable"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-redirects:
    runs-on: ubuntu-latest
    env:
      DOCS_DIR: docs

    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Ensure clean working tree
        run: |
          if git status --porcelain | grep -q .; then
            echo "Working tree is dirty before running the script."
            git status --porcelain
            exit 1
          fi

      - name: Install lychee
        env:
          LYCHEE_VERSION: "0.24.1"
        run: |
          ARCH=$(uname -m)
          TARBALL="lychee-${ARCH}-unknown-linux-gnu.tar.gz"
          wget -q "https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/${TARBALL}" -O "/tmp/${TARBALL}"
          tar -xzf "/tmp/${TARBALL}" -C /tmp
          sudo mv /tmp/lychee /usr/local/bin/lychee
          rm -f "/tmp/${TARBALL}"
          lychee --version

      - name: Run lychee (detailed JSON to stdout)
        run: |
          mkdir -p "$DOCS_DIR/_build"
          set +e
          lychee --config ./lychee.toml -vv --format json ./docs \
            > "$DOCS_DIR/_build/lychee-output.json" \
            2> "$DOCS_DIR/_build/lychee-debug.log"
          rc=$?
          set -e
          # Lychee exits non-zero when broken links exist; we still want the
          # JSON for the redirect fixer. Only abort on hard failures (exit > 2)
          # or empty JSON output (indicating a crash).
          if [ "$rc" -gt 2 ] || [ ! -s "$DOCS_DIR/_build/lychee-output.json" ]; then
            echo "lychee failed (exit $rc); debug log:"
            cat "$DOCS_DIR/_build/lychee-debug.log"
            exit 1
          fi
          cp "$DOCS_DIR/_build/lychee-output.json" ./lychee-output.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create temp directory
        run: |
          temp_dir=$(mktemp -d /tmp/workshop-linkcheck-fixes-XXXXXX)
          echo "TEMP_DIR=$temp_dir" >> "$GITHUB_ENV"

      - name: Run redirect fixer
        id: redirect_fixer
        run: |
          set -o pipefail
          args=(--docs-dir "$DOCS_DIR" --temp-dir "$TEMP_DIR" --redirect-codes "${REDIRECT_CODES}" --max-redirects "${MAX_REDIRECTS}")
          if [ "${{ inputs.verify_links }}" = "false" ]; then
            args+=(--no-verify)
          fi
          set +e
          python "$DOCS_DIR/update_redirected_links.py" "${args[@]}" 2>&1 | tee workflow-log.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          if [ "$exit_code" -eq 2 ]; then
            echo "no_redirects=true" >> "$GITHUB_OUTPUT"
            echo "No redirects found to fix."
            exit 0
          fi
          if [ "$exit_code" -eq 3 ]; then
            echo "verification_failed=true" >> "$GITHUB_OUTPUT"
            echo "no_redirects=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$exit_code" -ne 0 ]; then
            exit "$exit_code"
          fi
          echo "no_redirects=false" >> "$GITHUB_OUTPUT"
        env:
          MAX_REDIRECTS: ${{ inputs.max_redirects }}
          REDIRECT_CODES: ${{ inputs.redirect_codes }}

      - name: Check for changes
        id: git_changes
        if: steps.redirect_fixer.outputs.no_redirects != 'true'
        run: |
          if git status --porcelain | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare PR metadata
        id: pr_meta
        if: steps.git_changes.outputs.has_changes == 'true'
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = Path(os.environ["TEMP_DIR"]) / "redirect_fixes_manifest.json"
          data = json.loads(manifest.read_text(encoding="utf-8"))
          changes = data.get("changes", [])
          redirect_codes = ",".join(data.get("redirect_codes", []))
          failures = len(data.get("verification_failures", []))
          files_modified = len({change["file"] for change in changes})
          count = len(changes)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
            handle.write(f"count={count}\n")
            handle.write(f"files={files_modified}\n")
            handle.write(f"codes={redirect_codes}\n")
            handle.write(f"failures={failures}\n")
          PY

      - name: Set branch name
        id: branch_name
        if: steps.git_changes.outputs.has_changes == 'true'
        run: |
          echo "branch=docs/linkcheck-fixes-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Build PR body
        if: steps.git_changes.outputs.has_changes == 'true'
        run: |
          verification_check="[x]"
          verification_note=""
          if [ "${FAILURES}" -ne 0 ]; then
            verification_check="[ ]"
            verification_note="\n\nVerification failures were detected."
          fi
          if [ "${{ inputs.verify_links }}" = "false" ]; then
            verification_check="[ ]"
            verification_note="\n\nVerification was disabled for this run."
          fi

          cat <<EOF > "$TEMP_DIR/redirect_fixes_pr_body.md"
          This PR automatically fixes redirected links detected by \`make linkcheck\`.

          ## Summary
          - **Files modified:** ${FILES}
          - **Redirects fixed:** ${COUNT}
          - **Redirect codes processed:** ${CODES}

          EOF

          cat "$TEMP_DIR/redirect_fixes_summary.md" >> "$TEMP_DIR/redirect_fixes_pr_body.md"

          cat <<EOF >> "$TEMP_DIR/redirect_fixes_pr_body.md"

          ## Verification

          - ${verification_check} All updated links verified reachable
          - [ ] \`make linkcheck\` passes on this branch
          ${verification_note}

          ---
          *Automated by linkcheck redirect fixer workflow*
          EOF
        env:
          FAILURES: ${{ steps.pr_meta.outputs.failures }}
          FILES: ${{ steps.pr_meta.outputs.files }}
          COUNT: ${{ steps.pr_meta.outputs.count }}
          CODES: ${{ steps.pr_meta.outputs.codes }}

      - name: Commit changes and create PR
        if: steps.git_changes.outputs.has_changes == 'true'
        run: |
          git checkout -b "${BRANCH}"

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add .
          git commit -m "docs: Fix redirected links from linkcheck"
          git push --set-upstream origin "${BRANCH}"

          gh pr create \
            --title "docs: Fix ${COUNT} redirected links found by linkcheck" \
            --body-file "${TEMP_DIR}/redirect_fixes_pr_body.md" \
            --base main \
            --label "documentation" \
            --label "automated"
        env:
          BRANCH: ${{ steps.branch_name.outputs.branch }}
          COUNT: ${{ steps.pr_meta.outputs.count }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linkcheck-redirect-fixes
          if-no-files-found: warn
          path: |
            lychee-output.json
            workflow-log.txt
            ${{ env.TEMP_DIR }}/redirect_fixes_summary.md
