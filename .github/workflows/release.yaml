name: Release
on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        runner:
          - arch: ARM64
          - arch: X64
    runs-on:
      - self-hosted
      - Linux
      - noble
      - ${{ matrix.runner.arch }}
      - medium
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: canonical/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1.3.0
        id: snapcraft

      - run: |
          gh release create --notes-file=- "${GITHUB_REF#refs/tags/}" "$FILENAME" <<'EOF'
          ## Docs Checklist
          - [ ] JSON for SDKs
          - [ ] JSON for workshops
          - [ ] Release notes
          - [ ] Version bump
          - [ ] Coverage map update
          EOF
        env:
          FILENAME: ${{ steps.snapcraft.outputs.snap }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  generate-docs:
    permissions:
      contents: write
      pull-requests: write
    runs-on:
      - self-hosted
      - Linux
      - noble
    steps:
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Generate CLI reference docs
        run: |
          go run ./cmd/sdk generate-docs ./docs/reference/cli
          go run ./cmd/workshop generate-docs ./docs/reference/cli

      - name: Check for changes, commit, and create PR if any
        run: |
          if git diff --exit-code; then
            echo "No changes detected, skipping commit and PR creation."
          else
            pr_branch="docs/reference-cli-$(date +'%Y%m%d%H%M%S')"
            git checkout -b $pr_branch

            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'

            git add .
            git commit -m "Update CLI reference docs"
            git push --set-upstream origin $pr_branch

            gh pr create --title "Update CLI reference docs" --body "This PR updates the generated CLI reference documentation." --base main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
