name: Update starter pack

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Mondays

permissions:
  contents: write
  pull-requests: write

jobs:
  update-starter-pack:
    runs-on: ubuntu-22.04

    steps:
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Checkout starter pack repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: canonical/sphinx-docs-starter-pack
          path: starter-pack-temp
          persist-credentials: false

      - name: Update starter pack files
        run: |
          # Clean up any previous installation
          make -C docs clean
          rm -rf docs/{Makefile,.sphinx}

          # Copy the Makefile and .sphinx directory to the project's docs directory
          cp -a starter-pack-temp/docs/{Makefile,.sphinx} docs/

          # Merge requirements from input files to locked output file
          uv pip compile --universal \
            docs/requirements.in \
            starter-pack-temp/docs/requirements.txt \
            --output-file docs/requirements.txt

          # Get the latest commit hash from the starter pack
          cd starter-pack-temp
          STARTER_PACK_COMMIT=$(git rev-parse --short HEAD)
          echo "STARTER_PACK_COMMIT=$STARTER_PACK_COMMIT" >> $GITHUB_ENV
          cd ..

          # Clean up the temporary checkout
          rm -rf starter-pack-temp

          echo "Starter pack files updated successfully"

      - name: Install documentation dependencies
        run: make -C docs install

      - name: Check for changes, commit, and create PR if any
        run: |
          if git diff --exit-code; then
            echo "No changes detected, skipping commit and PR creation."
          else
            pr_branch="docs/update-starter-pack-${STARTER_PACK_COMMIT}-$(date +'%Y%m%d%H%M%S')"
            git checkout -b $pr_branch

            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'

            git add .
            git commit -m "Update documentation starter pack files"
            git push --set-upstream origin $pr_branch

            gh pr create --title "Update documentation starter pack files" --body "This PR updates the documentation starter pack files from the upstream repository." --base main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
