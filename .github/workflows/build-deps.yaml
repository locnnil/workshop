name: Build Dependencies
on:
  workflow_call:
    secrets:
      SDKCRAFT_STORE_CREDENTIALS:
        required: true
    outputs:
      snap_workshop:
        description: "Workshop snap filename"
        value: ${{ jobs.build-workshop.outputs.snap_workshop }}

permissions:
  contents: read

jobs:
  build-workshop:
    runs-on: ubuntu-latest
    outputs:
      snap_workshop: ${{ steps.snapcraft_workshop.outputs.snap }}
    steps:
      - name: Checkout Workshop
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Cache Workshop snap
        id: cache-workshop
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: workshop_*.snap
          key: workshop-snap-${{ github.sha }}
      - name: Build Workshop
        if: steps.cache-workshop.outputs.cache-hit != 'true'
        uses: canonical/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1.3.0
        id: snapcraft_workshop
      - name: Set snap path from cache
        if: steps.cache-workshop.outputs.cache-hit == 'true'
        id: snapcraft_workshop_cached
        run: |
          snap_file=$(ls workshop_*.snap)
          echo "snap=$snap_file" >> $GITHUB_OUTPUT
      - name: Upload Workshop
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: snap_workshop
          path: ${{ steps.cache-workshop.outputs.cache-hit == 'true' && steps.snapcraft_workshop_cached.outputs.snap || steps.snapcraft_workshop.outputs.snap }}

  build-spread:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workshop
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Get spread repository commit hash
        id: spread-sha
        run: |
          spread_sha=$(git ls-remote https://github.com/dmitry-lyfar/spread HEAD | awk '{print $1}')
          echo "sha=$spread_sha" >> $GITHUB_OUTPUT
      - name: Cache spread binary
        id: cache-spread
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: spread/spread
          key: spread-binary-${{ steps.spread-sha.outputs.sha }}
      - name: Setup Go
        if: steps.cache-spread.outputs.cache-hit != 'true'
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26"
          cache: false
      - name: Build spread
        if: steps.cache-spread.outputs.cache-hit != 'true'
        run: |
          # go install is not supported for forks...
          git clone https://github.com/dmitry-lyfar/spread
          pushd spread
          . "$GITHUB_WORKSPACE/tests/lib/retry.sh"
          retry 5 go build -o spread ./cmd/spread
          popd
      - name: Upload spread binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: spread_binary
          path: spread/spread

  detect-sdk-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      sdks: ${{ steps.detect.outputs.sdks }}
    steps:
      - name: Checkout Workshop
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: 'tree:0'
          persist-credentials: true

      - name: Detect staged SDKs
        id: detect
        run: |
          git fetch --filter=tree:0 origin "+${GITHUB_BASE_REF}:${GITHUB_BASE_REF}"
          base=$(git merge-base "$GITHUB_BASE_REF" HEAD)

          cd tests/lib/sdk
          for path in */*/*/; do
            if git diff --quiet "${base}..HEAD" -- "$path"; then
              continue
            fi
            if git cat-file -t "${base}:./${path}" &> /dev/null; then
              printf '::error::%s SDK is immutable, create a new SDK instead.\n' "${path%/}"
              exit 1
            fi
          done
          cd ..

          sdks=()
          if [ -d staging ]; then
            cd staging
            for path in */*/*/; do
              if git cat-file -t "${base}:../sdk/${path}" &> /dev/null; then
                printf '::error::%s SDK is immutable, create a new SDK instead.\n' "${path%/}"
                exit 1
              fi
              sdks+=("${path%/}")
            done
          fi

          {
            printf 'sdks='
            for sdk in "${sdks[@]}"; do
              IFS='/' read -r -a parts <<<"$sdk"

              platforms='["amd64"]'
              if [ -f "${sdk}/platforms.json" ]; then
                platforms=$(< "${sdk}/platforms.json")
              fi

              jq --null-input \
                --arg path "tests/lib/staging/$sdk" \
                --arg track "${parts[1]}" \
                --arg risk "${parts[2]}" \
                --argjson platforms "$platforms" \
                '$ARGS.named'
            done | jq --compact-output --slurp .
          } >> "$GITHUB_OUTPUT"
        shell: bash

  build-test-sdk:
    needs: detect-sdk-changes
    if: needs.detect-sdk-changes.outputs.sdks != '[]'
    strategy:
      matrix:
        include: ${{ fromJSON(needs.detect-sdk-changes.outputs.sdks) }}
      fail-fast: false
    uses: canonical/sdkcraft-actions/.github/workflows/upload.yml@92f5df60c0878aea4844a7380fdfd24063f89ac9
    with:
      platforms: ${{ toJSON(matrix.platforms) }}
      subdirectory: ${{ matrix.path }}
      track: ${{ matrix.track }}
      risk: ${{ matrix.risk }}
    secrets:
      SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS }}
