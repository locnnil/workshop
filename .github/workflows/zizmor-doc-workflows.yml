name: Audit doc workflows with zizmor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Mondays at 09:00 UTC

permissions: {}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor on doc workflows
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          inputs: >-
            .github/workflows/automatic-doc-checks.yml
            .github/workflows/doc-cover.yaml
            .github/workflows/doc-update-sdk-schema.yml
            .github/workflows/fix-redirected-links.yml
            .github/workflows/markdown-style-checks.yml
            .github/workflows/update-starter-pack.yaml
