name: LXD Candidate Check
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  build-deps:
    uses: ./.github/workflows/build-deps.yaml
    secrets:
      GH_SDKCRAFT: ${{ secrets.GH_SDKCRAFT }}
  snap-tests:
    needs: [build-deps]
    strategy:
      fail-fast: false
      matrix:
        suite: [main/, integration/]
    runs-on: [self-hosted, linux, jammy, x64, xlarge]
    steps:
      - name: Install LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1
        with:
          channel: 6/candidate
      - name: Cleanup job workspace
        run: |
          rm -rf "${{ github.workspace }}"
          mkdir "${{ github.workspace }}"
      - name: Checkout Workshop
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25"
          cache: false
      - name: Download Workshop Snap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: snap_workshop
          path: ${{ github.workspace }}/tests/
      - name: Download Sdkcraft Snap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: snap_sdkcraft
          path: ${{ github.workspace }}/tests/
      - name: Download spread binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: spread_binary
          path: /usr/local/bin
      - name: Install spread
        run: sudo chmod +x /usr/local/bin/spread
      - name: Set LXD storage size
        run: |
          lxc storage set default volume.size=32GB
      - name: Run spread
        run: |
          mkdir ${{ github.workspace }}.cover
          export LXD_CHANNEL='6/candidate'
          spread -artifacts=${{ github.workspace }}.cover tests/${{matrix.suite}}
