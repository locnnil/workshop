name: Release snap
on: [workflow_dispatch]

jobs:
  build:
    strategy:
      matrix:
        runner:
          - arch: ARM64
            size: medium
          - arch: X64
            size: large
    runs-on:
      - self-hosted
      - Linux
      - noble
      - ${{ matrix.runner.arch }}
      - ${{ matrix.runner.size }}
    steps:
      - uses: actions/checkout@v4

      - uses: canonical/action-build@v1
        id: snapcraft

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.snapcraft.outputs.snap }}
