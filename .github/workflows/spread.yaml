name: Spread
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workshop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: snapcore/action-build@v1
        id: snapcraft
      - uses: actions/upload-artifact@master
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}
  snap-tests:
    needs: build-snap
    strategy:
      matrix:
        os: [ubuntu-22.04-64]
        suite: [main, documentation, integration]
    runs-on: [self-hosted, linux, jammy, x64, xlarge]
    steps:
      - name: Cleanup job workspace
        run: |
          rm -rf "${{ github.workspace }}"
          mkdir "${{ github.workspace }}"
      - name: Setup tmate session
        uses: canonical/action-tmate@main
        with:
          detached: true
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Checkout Workshop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@master
        with:
          name: snap
          path: ${{ github.workspace }}/tests/
      - name: Install spread
        run: |
          # go install is not supported for forks...
          git clone https://github.com/dmitry-lyfar/spread
          cd spread
          go install ./...
      - name: Run spread
        run: | 
          lxd init --auto
          spread tests/${{matrix.suite}}/
