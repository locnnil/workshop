name: Spread
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workshop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: snapcore/action-build@v1
        id: snapcraft
      - uses: actions/upload-artifact@master
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}
  snap-tests:
    needs: build-snap
    strategy:
      matrix:
        os: [ubuntu-22.04-64]
        suite: [main, documentation, integration]
    runs-on: [self-hosted, linux, jammy, x64, xlarge]
    steps:
      - name: Cleanup job workspace
        run: |
          rm -rf "${{ github.workspace }}"
          mkdir "${{ github.workspace }}"
      - name: Setup
        uses: actions/setup-go@v3
        with:
          go-version: '1.20'
      - name: Install multipass
        run: sudo snap install multipass
      - name: Checkout Workshop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@master
        with:
          name: snap
          path: ${{ github.workspace }}/tests/
      - name: Install spread
        run: go install github.com/snapcore/spread/cmd/spread@latest
      - name: Run spread
        run: spread tests/${{matrix.suite}}/
