name: Spread
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:

jobs:
  snap-tests:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Cleanup job workspace
        run: |
          rm -rf "${{ github.workspace }}"
          mkdir "${{ github.workspace }}"
      - name: Checkout Workshop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Run spread
        run: spread
