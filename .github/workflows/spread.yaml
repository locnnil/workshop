name: Workshop end-to-end tests
on: [workflow_dispatch, workflow_call]

jobs:
  build-workshop:
    runs-on: ubuntu-latest
    outputs:
      snap_workshop: ${{ steps.snapcraft_workshop.outputs.snap }}
    steps:
      - name: Checkout Workshop
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Cache Workshop snap
        id: cache-workshop
        uses: actions/cache@v4
        with:
          path: workshop_*.snap
          key: workshop-snap-${{ github.sha }}
      - name: Build Workshop
        if: steps.cache-workshop.outputs.cache-hit != 'true'
        uses: canonical/action-build@v1
        id: snapcraft_workshop
      - name: Set snap path from cache
        if: steps.cache-workshop.outputs.cache-hit == 'true'
        id: snapcraft_workshop_cached
        run: |
          snap_file=$(ls workshop_*.snap)
          echo "snap=$snap_file" >> $GITHUB_OUTPUT
      - name: Upload Workshop
        uses: actions/upload-artifact@master
        with:
          name: snap_workshop
          path: ${{ steps.cache-workshop.outputs.cache-hit == 'true' && steps.snapcraft_workshop_cached.outputs.snap || steps.snapcraft_workshop.outputs.snap }}

  build-sdkcraft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sdkcraft
        uses: actions/checkout@v6
        with:
          repository: canonical/sdkcraft
          show-progress: true
          token: ${{ secrets.GH_SDKCRAFT }}
          path: sdkcraft
          fetch-depth: 0
      - name: Get Sdkcraft commit hash
        id: sdkcraft-sha
        run: echo "sha=$(git -C sdkcraft rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Cache Sdkcraft snap
        id: cache-sdkcraft
        uses: actions/cache@v4
        with:
          path: sdkcraft/sdkcraft_*.snap
          key: sdkcraft-snap-${{ steps.sdkcraft-sha.outputs.sha }}
      - name: Build Sdkcraft
        if: steps.cache-sdkcraft.outputs.cache-hit != 'true'
        uses: canonical/action-build@v1
        id: snapcraft_sdkcraft
        with:
          path: sdkcraft
      - name: Set snap path from cache
        if: steps.cache-sdkcraft.outputs.cache-hit == 'true'
        id: snapcraft_sdkcraft_cached
        run: |
          snap_file=$(ls sdkcraft/sdkcraft_*.snap)
          echo "snap=$snap_file" >> $GITHUB_OUTPUT
      - name: Upload Sdkcraft
        uses: actions/upload-artifact@master
        with:
          name: snap_sdkcraft
          path: ${{ steps.cache-sdkcraft.outputs.cache-hit == 'true' && steps.snapcraft_sdkcraft_cached.outputs.snap || steps.snapcraft_sdkcraft.outputs.snap }}

  build-spread:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workshop
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get spread repository commit hash
        id: spread-sha
        run: |
          spread_sha=$(git ls-remote https://github.com/dmitry-lyfar/spread HEAD | awk '{print $1}')
          echo "sha=$spread_sha" >> $GITHUB_OUTPUT
      - name: Cache spread binary
        id: cache-spread
        uses: actions/cache@v4
        with:
          path: spread/spread
          key: spread-binary-${{ steps.spread-sha.outputs.sha }}
      - name: Setup Go
        if: steps.cache-spread.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: Build spread
        if: steps.cache-spread.outputs.cache-hit != 'true'
        run: |
          # go install is not supported for forks...
          git clone https://github.com/dmitry-lyfar/spread
          pushd spread
          . "$GITHUB_WORKSPACE/tests/lib/retry.sh"
          retry 5 go build -o spread ./cmd/spread
          popd
      - name: Upload spread binary
        uses: actions/upload-artifact@master
        with:
          name: spread_binary
          path: spread/spread
  snap-tests:
    needs: [build-workshop, build-sdkcraft, build-spread]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04-64]
        suite: [main/, docs-how-to/, docs-tutorial/part-1, docs-tutorial/part-2, docs-tutorial/part-3, docs-tutorial/part-4, integration/]
    runs-on: [self-hosted, linux, jammy, x64, xlarge]
    steps:
      - name: Install LXD
        uses: canonical/setup-lxd@main
        with:
          channel: 6/stable
      - name: Cleanup job workspace
        run: |
          rm -rf "${{ github.workspace }}"
          mkdir "${{ github.workspace }}"
      - name: Checkout Workshop
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: Download Workshop Snap
        uses: actions/download-artifact@master
        with:
          name: snap_workshop
          path: ${{ github.workspace }}/tests/
      - name: Download Sdkcraft Snap
        uses: actions/download-artifact@master
        with:
          name: snap_sdkcraft
          path: ${{ github.workspace }}/tests/
      - name: Download spread binary
        uses: actions/download-artifact@master
        with:
          name: spread_binary
          path: /usr/local/bin
      - name: Install spread
        run: sudo chmod +x /usr/local/bin/spread
      - name: Set LXD storage size
        run: |
          lxc storage set default volume.size=32GB
      - name: Run spread
        run: |
          mkdir ${{ github.workspace }}.cover
          spread -artifacts=${{ github.workspace }}.cover tests/${{matrix.suite}}
      - name: Trim trailing slash from matrix.suite
        id: sanitize
        run: |
          suite_name="${{ matrix.suite }}"
          sanitized_name="${suite_name%/}"
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-${{ steps.sanitize.outputs.sanitized_name }}
          path: ${{ github.workspace }}.cover/lxd:ubuntu-24.04:tests/
          if-no-files-found: ignore
  publish:
    needs: [build-workshop, build-sdkcraft, build-spread, snap-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: snap_workshop
      - uses: canonical/action-publish@v1
        if: github.event_name == 'push'
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.STORE_CREDENTIALS }}
        with:
          snap: ${{ needs.build-workshop.outputs.snap_workshop }}
          release: edge
