name: Spread
on: [workflow_dispatch, workflow_call]

jobs:
  build-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workshop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: canonical/action-build@v1
        id: snapcraft
      - uses: actions/upload-artifact@master
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}
  snap-tests:
    needs: build-snap
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04-64]
        suite: [main, documentation, integration]
    runs-on: [self-hosted, linux, jammy, x64, xlarge]
    steps:
      - name: Install LXD
        uses: canonical/setup-lxd@main
        with:
          channel: 5.21/stable
      - name: Cleanup job workspace
        run: |
          rm -rf "${{ github.workspace }}"
          mkdir "${{ github.workspace }}"
      - name: Checkout Workshop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false
      - uses: actions/download-artifact@master
        with:
          name: snap
          path: ${{ github.workspace }}/tests/
      - name: Install spread
        run: |
          # go install is not supported for forks...
          git clone https://github.com/dmitry-lyfar/spread
          pushd spread
          go install ./...
          popd
      - name: Run spread
        run: |
          mkdir ${{ github.workspace }}.cover
          spread -artifacts=${{ github.workspace }}.cover tests/${{matrix.suite}}/
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-${{matrix.suite}}
          path: ${{ github.workspace }}.cover/lxd:ubuntu-24.04:tests/
          if-no-files-found: ignore
