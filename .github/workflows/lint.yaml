name: Lint
on:
  pull_request:
  push:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        id: lint
        with:
          version: latest
          args: "--out-format=colored-line-number"
          skip-cache: true

      - name: errcheck
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: "--out-format=colored-line-number --enable-only errcheck"
          only-new-issues: true
          skip-cache: true

      - name: shellcheck
        run: |
          git ls-files | file --mime-type -Nnf- | grep shellscript | cut -f1 -d: | xargs shellcheck
          snapd-testing-tools/utils/spread-shellcheck tests/integration

      - name: Print error message
        if: always() && steps.lint.outcome == 'failure'
        run: |
          echo '
          Linting failed. On your local machine, please run
              golangci-lint run --fix
          and check in the changes.'
          exit 1
