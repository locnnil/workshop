name: Lint
on:
  pull_request:
  push:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/checkout@v4
        with:
          repository: canonical/snapd-testing-tools
          path: snapd-testing-tools	      
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        id: lint
        with:
          version: latest
          skip-cache: true

      - name: errcheck
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --config=.golangci.errcheck.yaml
          only-new-issues: true
          skip-cache: true

      - name: shellcheck
        run: |
          git ls-files | file --mime-type -Nnf- | grep shellscript | cut -f1 -d: | xargs shellcheck --external-sources
          snapd-testing-tools/utils/spread-shellcheck tests/integration

      - name: Print error message
        if: always() && steps.lint.outcome == 'failure'
        run: |
          echo '
          Linting failed. On your local machine, please run
              golangci-lint run --fix
          and check in the changes.'
          exit 1
