# When updating this file, please carefully consider whether the snapshot
# format revision number needs to be bumped. This file is used by the
# snapshotSuite.TestLxdBackendSnapshotFormat test. It records the writable
# parts of workshops and snapshots at each step from launch to snapshot.
# Changes to this file may or may not influence the snapshot format. For
# instance cloud-init.user-data is likely to modify files and therefore change
# the snapshot format. Other options like boot.autostart are omitted from
# snapshots and have no effect.
launched:
  architecture: ''
  config:
    boot.autostart: 'false'
    raw.idmap: |-
      uid 1000 1000
      gid 1000 1000
    raw.lxc: lxc.mount.entry = tmpfs tmp tmpfs defaults
    security.nesting: 'true'
    cloud-init.user-data: 'e2e2ae8e679e632b6aefd9e2378ec5b0695e1d03ba0418a04aa2d304328e9bb61ee5aae99c0b53254895b1e39555c0f2'
    user.workshop.name: test
    user.workshop.project-id: '42424242'
  description: ''
  devices:
    cache.apt:
      path: /var/cache/apt/archives
      readonly: 'false'
      type: disk
    root:
      path: /
      pool: workshop
      type: disk
    workshop.network:
      name: eth0
      network: workshopbr0
      type: nic
    workshop.socket:
      bind: instance
      listen: unix:/var/lib/workshop/run/workshop.socket.untrusted
      mode: '0666'
      type: proxy
    workshop.workshopctl:
      path: /usr/bin/workshopctl
      readonly: 'true'
      type: disk
  ephemeral: false
  profiles: [default]
  stateful: false
