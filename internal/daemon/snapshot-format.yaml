    - drwxr-xr-x var/lib/workshop
    - drwxr-xr-x var/lib/workshop/run
    - drwxr-xr-x var/lib/workshop/sdk
    - Lrwxrwxrwx var/lib/workshop/sdk/system
    - Lrwxrwxrwx var/lib/workshop/sdk/test-sdk
    - Lrwxrwxrwx var/lib/workshop/sdk/test-sdk-2
    - Lrwxrwxrwx var/lib/workshop/sdk/test-sdk-3
  tasks:
    create-workshop: 1
    start-workshop: 1
    install-sdk: 4
    run-hook: 4
    snapshot-sdk: 3
  fs-calls: 13
  exec-calls:
    - ["sudo", "--user=#0", "--group=#0", "--preserve-env", "--", "bash", "-l", "-c", 'exec -- "$0" "$@"', "bash", "-o", "errexit", "-o", "pipefail", "/var/lib/workshop/sdk/test-sdk-2/sdk/hooks/setup-base"]
    - ["sudo", "--user=#0", "--group=#0", "--preserve-env", "--", "bash", "-l", "-c", 'exec -- "$0" "$@"', "bash", "-o", "errexit", "-o", "pipefail", "/var/lib/workshop/sdk/test-sdk/sdk/hooks/setup-base"]
sketch:
