project: workshop
path: /workshop
environment:
      PATH: $PATH:~/go/bin
      PROJECT_PATH: /workshop
      TESTSLIB: $PROJECT_PATH/tests/lib
      SDKCONTENT: $PROJECT_PATH/tests/lib/sdk
      SDK_STORE_BUCKET_DIR: /data/sdk-store
repack: |
    test -f tests/*.snap || snapcraft -o tests/
    cat <&3 >&4
backends:
  multipass:
    type: adhoc
    allocate: |
      if [ "$SPREAD_SYSTEM" = "ubuntu-24.04-64" ]; then
          image="daily:devel"
          instance_name=spread-devel
      else
          # SPREAD_SYSTEM has the following format here 'ubuntu-XX.YY-64' and gets
          # translated to an image XX.YY.
          image=$(echo $SPREAD_SYSTEM | sed -e 's/ubuntu-\(.*\)-64/\1/')
          instance_name="spread-${image/./}"
      fi
      if [ -z "${image}" ]; then
        FATAL "$SPREAD_SYSTEM is not supported!"
      fi
      multipass launch --disk 20G --memory 4G --cpus 8 --name "$instance_name" "$image"
      # Get the IP from the instance
      ip=$(multipass info --format csv "$instance_name" | tail -1 | cut -d\, -f3)
      # Enable PasswordAuthertication for root over SSH.
      multipass exec "$instance_name" -- \
        sudo sh -c "echo root:ubuntu | sudo chpasswd"
      multipass exec "$instance_name" -- \
        sudo sh -c \
        "sed -i /etc/ssh/sshd_config -e 's/^PasswordAuthentication.*/PasswordAuthentication yes/' -e 's/^#PermitRootLogin.*/PermitRootLogin yes/'"
      multipass exec "$instance_name" -- \
        sudo systemctl restart ssh
      ADDRESS "$ip:22"
    discard: |
      if [ "$SPREAD_SYSTEM" = "ubuntu-24.04-64" ]; then
          image="daily:devel"
          instance_name=spread-devel
      else
          # SPREAD_SYSTEM has the following format here 'ubuntu-XX.YY-64' and gets
          # translated to an image XX.YY.
          image=$(echo $SPREAD_SYSTEM | sed -e 's/ubuntu-\(.*\)-64/\1/')
          instance_name="spread-${image/./}"
      fi
      if [ -z "${image}" ]; then
        FATAL "$SPREAD_SYSTEM is not supported!"
      fi
      multipass delete --purge "$instance_name"
    systems:
      - ubuntu-22.04-64:
          workers: 1
          username: root
          password: ubuntu
suites:
  tests/main/:
    summary: Core workshop scenarios
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
      start_sdk_store
    restore: |
      . "$TESTSLIB"/utils.sh
      stop_sdk_store
      cleanup_environment
  tests/integration/:
    summary: LXD integration tests
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
    restore: |
      . "$TESTSLIB"/utils.sh
      cleanup_environment
  tests/documentation/:
   summary: Documentation tests
   kill-timeout: 30m
exclude:
  - .git
  - .workshop.lock
  - docs
