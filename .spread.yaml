project: workspace

environment:
      PATH: $PATH:~/go/bin
      WORKSPACE: /var/lib/workspace/default
      TESTSLIB: $SPREAD_PATH/tests/lib

prepare: |
      apt-get install -y --no-install-recommends gcc libc6-dev snapd jq
      snap install go --classic

      snap install lxd --classic
      cd /remote; GOBIN=/usr/bin go install -buildvcs=false /remote/cmd/workspace/
      lxd init --auto
backends:
  multipass:
    type: adhoc
    allocate: |
      if [ "$SPREAD_SYSTEM" = "ubuntu-24.04-64" ]; then
          image="daily:devel"
          instance_name=spread-devel
      else
          # SPREAD_SYSTEM has the following format here 'ubuntu-XX.YY-64' and gets
          # translated to an image XX.YY.
          image=$(echo $SPREAD_SYSTEM | sed -e 's/ubuntu-\(.*\)-64/\1/')
          instance_name="spread-${image/./}"
      fi
      if [ -z "${image}" ]; then
        FATAL "$SPREAD_SYSTEM is not supported!"
      fi
      multipass launch --disk 20G --memory 8G --name "$instance_name" "$image"
      # Get the IP from the instance
      ip=$(multipass info --format csv "$instance_name" | tail -1 | cut -d\, -f3)
      # Enable PasswordAuthertication for root over SSH.
      multipass exec "$instance_name" -- \
        sudo sh -c "echo root:ubuntu | sudo chpasswd"
      multipass exec "$instance_name" -- \
        sudo sh -c \
        "sed -i /etc/ssh/sshd_config -e 's/^PasswordAuthentication.*/PasswordAuthentication yes/' -e 's/^#PermitRootLogin.*/PermitRootLogin yes/'"
      multipass exec "$instance_name" -- \
        sudo systemctl restart ssh
      ADDRESS "$ip:22"
    discard: |
      if [ "$SPREAD_SYSTEM" = "ubuntu-24.04-64" ]; then
          image="daily:devel"
          instance_name=spread-devel
      else
          # SPREAD_SYSTEM has the following format here 'ubuntu-XX.YY-64' and gets
          # translated to an image XX.YY.
          image=$(echo $SPREAD_SYSTEM | sed -e 's/ubuntu-\(.*\)-64/\1/')
          instance_name="spread-${image/./}"
      fi
      if [ -z "${image}" ]; then
        FATAL "$SPREAD_SYSTEM is not supported!"
      fi
      multipass delete --purge "$instance_name"
    systems:
      - ubuntu-22.04-64:
          workers: 1
          username: root
          password: ubuntu
suites:
  tests/main/:
    summary: Core workspace scenarios

path: /remote
exclude:
  - .workspace.lock
