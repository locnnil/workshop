project: workshop
path: /workshop
environment:
      PATH: $PATH:~/go/bin
      PROJECT_PATH: /workshop
      TESTSLIB: $PROJECT_PATH/tests/lib
      SDKCONTENT: $PROJECT_PATH/tests/lib/sdk
      SDK_STORE_BUCKET_DIR: /data/sdk-store
repack: |
    test -f tests/*.snap || snapcraft -o tests/
    cat <&3 >&4
backends:
  lxd:
    systems:
      - ubuntu-22.04:
          workers: 1
suites:
  tests/main/:
    summary: Core workshop scenarios
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
      start_sdk_store
    restore: |
      . "$TESTSLIB"/utils.sh
      stop_sdk_store
      cleanup_environment
    kill-timeout: 30m
  tests/integration/:
    summary: LXD integration tests
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
    restore: |
      . "$TESTSLIB"/utils.sh
      cleanup_environment
    kill-timeout: 30m
  tests/documentation/:
    summary: Documentation tests
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
      start_sdk_store
    restore: |
      . "$TESTSLIB"/utils.sh
      stop_sdk_store
      cleanup_environment
    kill-timeout: 30m
exclude:
  - .git
  - .workshop.lock
  - docs
  - __debug_bin*
