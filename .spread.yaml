project: workshop
path: /workshop
environment:
  LXD_CHANNEL: $(HOST:printf %s "${LXD_CHANNEL:-6/stable}")
  LXD_CUSTOM_SNAP: $(HOST:printf %s "${LXD_CUSTOM_SNAP-}")
  PATH: $PATH:~/go/bin
  PROJECT_PATH: /workshop
  TESTSLIB: $PROJECT_PATH/tests/lib
  IMAGE_SERVER: $(HOST:echo -n $WORKSHOP_IMAGE_SERVER)
repack: |
  test -f tests/workshop_*.snap || snapcraft pack -o tests/
  cat <&3 >&4
backends:
  lxd:
    systems:
      - ubuntu-24.04:
          workers: 2
suites:
  tests/main/:
    summary: Core workshop scenarios
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
      setup_workshop
      install_sdkcraft
    prepare-each: |
      date --rfc-3339=seconds > /tmp/spread-job-start
    restore: |
      . "$TESTSLIB"/utils.sh
      cleanup_workshop
    debug-each: |
      lxc list --project workshop.ubuntu || true
      sudo -u ubuntu 2>&1 -- workshop list --global || true
      journalctl --since="$(</tmp/spread-job-start)" --unit=snap.workshop.workshopd.service || true
    kill-timeout: 30m
  tests/integration/:
    summary: LXD integration tests
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
    kill-timeout: 30m
  tests/docs-tutorial/:
    summary: Documentation tutorial tests
    repack: |
      test -f tests/sdkcraft_*.snap
      cat <&3 >&4
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
      setup_workshop
      install_sdkcraft
    prepare-each: |
      date --rfc-3339=seconds > /tmp/spread-job-start
    restore: |
      . "$TESTSLIB"/utils.sh
      cleanup_workshop
    debug-each: |
      journalctl --since="$(</tmp/spread-job-start)" --unit=snap.workshop.workshopd.service || true
    kill-timeout: 30m
  tests/docs-how-to/:
    summary: Documentation how-to tests
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
      setup_workshop
    prepare-each: |
      date --rfc-3339=seconds > /tmp/spread-job-start
    restore: |
      . "$TESTSLIB"/utils.sh
      cleanup_workshop
    debug-each: |
      journalctl --since="$(</tmp/spread-job-start)" --unit=snap.workshop.workshopd.service || true
    kill-timeout: 20m
exclude:
  - .git
  - .workshop.lock
  - docs
  - __debug_bin*
