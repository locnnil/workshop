project: workshop
path: /workshop
environment:
  LXD_CHANNEL: $(HOST:printf %s "${LXD_CHANNEL:-6/stable}")
  PATH: $PATH:~/go/bin
  PROJECT_PATH: /workshop
  TESTSLIB: $PROJECT_PATH/tests/lib
  TESTS_SDKS: $PROJECT_PATH/tests/lib/sdk
  SDK_STORE_BUCKET_DIR: /data/sdkstore
  IMAGE_SERVER: $(HOST:echo -n $WORKSHOP_IMAGE_SERVER)
repack: |
  test -f tests/workshop_*.snap || snapcraft pack -o tests/
  cat <&3 >&4
backends:
  lxd:
    systems:
      - ubuntu-24.04:
          workers: 2
suites:
  tests/main/:
    summary: Core workshop scenarios
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
      setup_workshop
    restore: |
      . "$TESTSLIB"/utils.sh
      cleanup_workshop
    debug: |
      lxc list --project workshop.ubuntu
      sudo -u ubuntu 2>&1 -- workshop list --global
    kill-timeout: 30m
  tests/integration/:
    summary: LXD integration tests
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
    kill-timeout: 30m
  tests/docs-tutorial/:
    summary: Documentation tutorial tests
    repack: |
      test -f tests/sdkcraft_*.snap
      cat <&3 >&4
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
      setup_workshop true  # use real store
      install_sdkcraft
    restore: |
      . "$TESTSLIB"/utils.sh
      cleanup_workshop true  # used real store, no need to clean it
    kill-timeout: 30m
  tests/docs-how-to/:
    summary: Documentation how-to tests
    prepare: |
      . "$TESTSLIB"/utils.sh
      prepare_environment
      setup_workshop
    restore: |
      . "$TESTSLIB"/utils.sh
      cleanup_workshop
    kill-timeout: 20m
exclude:
  - .git
  - .workshop.lock
  - docs
  - __debug_bin*
