name: workshop
title: Workshop
base: core22
version: 0.1.0
summary: Workshop automates intricate prerequisite setup for your development projects
description: |
  Workshop automates intricate prerequisite setup for your projects, allowing
  you to define development environments in straightforward YAML.

  The tool consumes the definition to create a contained workshop, installs the
  dependencies it lists as a number of SDKs, and attaches their life cycle hooks
  for run-time control.

  IDEs such as Visual Studio Code or JupyterLab can discover workshops and
  leverage them in their operation, tidying up your system and streamlining your
  work.
confinement: devmode
grade: devel
apps:
  workshop:
    environment:
      WORKSHOP: ${SNAP_COMMON}
    command: bin/workshop
  workspaced:
    environment:
      WORKSHOP: ${SNAP_COMMON}
    command: bin/workspaced run --create-dirs
    daemon: simple
    plugs:
      - home
      - lxd
      - network
parts:
  workshop:
    plugin: go
    source: .
    source-type: local
    build-snaps:
        - go/latest/stable
