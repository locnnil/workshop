name: workshop
title: Workshop
base: core24
adopt-info: workshop
summary: A tool for defining and handling ephemeral development environments
description: |
  List your dependencies and components in YAML to define an environment.

  The key pieces of a definition are SDKs, independent but connectable units of
  functionality created by software publishers and available on the SDK Store.
  Workshop simplifies experiments with your environment layout.

  With Workshop, you can launch a setup that previously took hours to configure
  in a few commands and be sure that it stays operational. It assists in issue
  reproduction, enables hands-on code reviews and turns environment updates into
  manageable transactions, reducing the need to battle with your tooling every
  day.

confinement: classic
apps:
  workshop:
    environment:
      WORKSHOP_SOCKET: $SNAP_COMMON/workshop/workshop.socket
    command: bin/workshop
  workshopd:
    environment:
      PATH: ${SNAP}/usr/bin:${PATH}
      WORKSHOP: ${SNAP_DATA}
      WORKSHOP_CACHE: $SNAP_COMMON/workshop/cache
      WORKSHOP_SOCKET: $SNAP_COMMON/workshop/workshop.socket
    command: commands/run_daemon
    daemon: notify
    restart-condition: on-failure
    sockets:
      unix:
        listen-stream: $SNAP_COMMON/workshop/workshop.socket
        socket-mode: 0666
  workshopctl:
    command: bin/workshopctl
  sdk:
    environment:
      WORKSHOP_SOCKET: $SNAP_COMMON/workshop/workshop.socket
    command: bin/sdk
    aliases:
      - sdk
parts:
  workshop:
    plugin: go
    source: .
    source-type: local
    build-packages:
      - git
    build-snaps:
      - go/1.26/stable
    build-environment:
      - CGO_LDFLAGS_ALLOW: ".*"
    override-build: |
      if [[ "$CRAFT_ARCH_BUILD_FOR" == "amd64" ]]; then
       export CGO_LDFLAGS="-Wl,-rpath=/snap/core24/current/usr/lib/x86_64-linux-gnu -Wl,--disable-new-dtags -Wl,-dynamic-linker=/snap/core24/current/lib64/ld-linux-x86-64.so.2"
      elif [[ "$CRAFT_ARCH_BUILD_FOR" == "arm64" ]]; then
        export CGO_LDFLAGS="-Wl,-rpath=/snap/core24/current/lib/aarch64-linux-gnu -Wl,--disable-new-dtags -Wl,-dynamic-linker=/snap/core24/current/lib/ld-linux-aarch64.so.1"
      fi
      CGO_ENABLED=0 go build -o "${CRAFT_PART_INSTALL}/bin/workshop" ./cmd/workshop
      go build -o "${CRAFT_PART_INSTALL}/bin/workshopd" ./cmd/workshopd
      CGO_ENABLED=0 go build -o "${CRAFT_PART_INSTALL}/bin/workshopctl" ./cmd/workshopctl
      CGO_ENABLED=0 go build -o "${CRAFT_PART_INSTALL}/bin/sdk" ./cmd/sdk

      # Set snap version including git commit hash
      VERSION="$("${CRAFT_PART_INSTALL}/bin/workshop" --version)"
      if [ -d .git ]; then
        VERSION="${VERSION}-$(git rev-parse --short HEAD)"
      elif [ -f .git ]; then
        # Likely building from a git worktree
        VERSION="${VERSION}-dev"
      fi
      craftctl set version="${VERSION}"
    prime:
      - bin/workshop
      - bin/workshopd
      - bin/workshopctl
      - bin/sdk
  zstd:
    plugin: nil
    stage-packages:
      - zstd
    organize:
      usr/bin/: bin/
    prime:
      - bin/pzstd
      - bin/zstd
  wrappers:
    plugin: dump
    source: snap/local/
    organize:
      hooks/: snap/hooks/
      lib/: snap/lib/
