name: workspace
title: Workspace
base: core22
version: 0.1.0
summary: Workspace
description: |
  Workspace is a tool that automates intricate prerequisite setup for your projects.
confinement: devmode
grade: devel
apps:
  workspace:
    environment:
      WORKSPACE: ${SNAP_COMMON}
    command: bin/workspace
  workspaced:
    environment:
      WORKSPACE: ${SNAP_COMMON}
    command: bin/workspaced run --create-dirs
    daemon: simple
    plugs:
      - home
      - lxd
      - network
parts:
  workspace:
    plugin: go
    source: .
    source-type: local
    build-snaps:
        - go/latest/stable
