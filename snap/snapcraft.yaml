name: workshop
title: Workshop
base: core22
version: 0.1.0
summary: A tool for defining and managing ephemeral development environments
description: |
  Define your prerequisites and dependencies in simple YAML.

  Workshop consumes the definition to create a contained workshop,
  installs the components as a set of SDKs
  and attaches custom actions for run-time control.

  IDEs such as Visual Studio Code or JupyterLab can discover workshops
  and use them in day-to-day operations,
  tidying up your system and streamlining your work.
confinement: classic
grade: devel
hooks:
    remove:
      plugs: [lxd]
apps:
  workshop:
    environment:
      WORKSHOP: ${SNAP_COMMON}
    command: bin/workshop
  workshopd:
    environment:
      WORKSHOP: ${SNAP_COMMON}
    command: commands/run_daemon
    daemon: simple
    restart-condition: on-failure
    plugs:
      - home
      - lxd
      - network
  workshopctl:
    environment:
      WORKSHOP: ${SNAP_COMMON}
    command: bin/workshopctl
parts:
  workshop:
    plugin: go
    source: .
    source-type: local    
    build-snaps:
      - go/1.21/stable
    build-environment:
      - CGO_LDFLAGS_ALLOW: ".*"
    override-build: |
      if [[ "$CRAFT_ARCH_BUILD_FOR" == "amd64" ]]; then
       export CGO_LDFLAGS="-Wl,-rpath=/snap/core22/current/lib/x86_64-linux-gnu -Wl,--disable-new-dtags -Wl,-dynamic-linker=/snap/core22/current/lib64/ld-linux-x86-64.so.2"
      elif [[ "$CRAFT_ARCH_BUILD_FOR" == "arm64" ]]; then
        export CGO_LDFLAGS="-Wl,-rpath=/snap/core22/current/lib/aarch64-linux-gnu -Wl,--disable-new-dtags -Wl,-dynamic-linker=/snap/core22/current/lib/ld-linux-aarch64.so.1"
      fi
      CGO_ENABLED=0 go build -o "${CRAFT_PART_INSTALL}/bin/workshop" ./cmd/workshop
      go build -trimpath -o "${CRAFT_PART_INSTALL}/bin/workshopd" ./cmd/workshopd
      CGO_ENABLED=0 go build -o "${CRAFT_PART_INSTALL}/bin/workshopctl" ./cmd/workshopctl
    prime:
      - bin/workshop
      - bin/workshopd
      - bin/workshopctl
  wrappers:
    plugin: dump
    source: snap/local/
    organize:
      hooks/: snap/hooks/
