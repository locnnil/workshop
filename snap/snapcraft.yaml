name: workshop
title: Workshop
base: core22
version: 0.1.0
summary: A tool for defining and managing complex development environments
description: |
  Define your prerequisites and dependencies in simple YAML.

  Workshop consumes the definition to create a contained workshop,
  installs the components as a set of SDKs
  and attaches custom actions for run-time control.

  IDEs such as Visual Studio Code or JupyterLab can discover workshops
  and use them in day-to-day operations,
  tidying up your system and streamlining your work.
confinement: classic
grade: devel
apps:
  workshop:
    environment:
      WORKSHOP: ${SNAP_COMMON}
    command: bin/workshop
  workshopd:
    environment:
      WORKSHOP: ${SNAP_COMMON}
    command: commands/run_daemon
    daemon: simple
    restart-condition: on-failure
    plugs:
      - home
      - lxd
      - network
  workshopctl:
    environment:
      WORKSHOP: ${SNAP_COMMON}
    command: bin/workshopctl
parts:
  workshop:
    plugin: go
    source: .
    source-type: local
    override-build: |
      go install ./cmd/workshop
      go install ./cmd/workshopd
      CGO_ENABLED=0 go install ./cmd/workshopctl
    build-snaps:
      - go/latest/stable
      
  wrappers:
    plugin: dump
    source: snap/local/
    organize:
      hooks/: snap/hooks/
