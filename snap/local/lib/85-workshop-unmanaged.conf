# This is the equivalent of an existing udev rule in 85-nm-unmanaged.rules.
# The reason we need it is that, when removing a NIC device from a container,
# LXD moves the device out of the container's network namespace before it is
# deleted. NetworkManager sees that this device is already configured, but
# doesn't (yet) have NM_UNMANAGED=1, so it decides to send DHCPDISCOVER packets
# to the device, which can lead to strange effects.
#
# The reason to exclude eth* is because we might be inside another LXD
# container, in which case the main NIC is also a veth device, but we want
# NetworkManager to manage it anyway. This is consistent with udev, except the
# wildcard is a bit different because NetworkManager doesn't support [0-9].
[device-unmanaged-veth]
match-device=driver:veth,except:interface-name:eth*
managed=0
